<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>资源容量看板</title>
    <link rel="stylesheet" href="./styles.css?v=20260413a" />
  </head>
  <body>
    <div class="bg-glow"></div>
    <div class="page">
      <header class="top">
        <div>
          <div class="title">资源容量看板</div>
          <div class="subtitle">离线快照视图，统一查看资源压力、余量和 Pod 排障入口</div>
        </div>
        <div class="top-side">
          <button class="top-button" id="filter-drawer-open" type="button">高级筛选</button>
          <button class="top-button" id="settings-drawer-open" type="button">视图设置</button>
          <div class="meta-stack">
            <div class="meta" id="meta">加载中...</div>
            <div class="meta-badge" id="top-status">加载中...</div>
          </div>
        </div>
      </header>

      <section class="toolbar">
        <div class="toolbar-left">
          <div class="seg" id="metric-filter">
            <button data-metric="all" class="active">全部</button>
            <button data-metric="disk">磁盘</button>
            <button data-metric="cpu">CPU</button>
            <button data-metric="mem">Mem</button>
            <button data-metric="pod">Pod</button>
          </div>
          <div class="seg">
            <select id="cluster-select">
              <option value="all">全部集群</option>
            </select>
          </div>
          <div class="search">
            <input id="search" type="search" placeholder="搜索 节点 / Pod / 挂载点 / 分组" />
          </div>
        </div>
        <div class="legend">
          <span class="pill alert">告警</span>
          <span class="pill watch">关注</span>
          <span class="pill safe">安全</span>
          <span class="pill unknown">未知</span>
        </div>
      </section>

      <section class="active-filters" id="active-filters"></section>
      <section class="kpis" id="kpis"></section>

      <section class="highlights">
        <div class="panel">
          <div class="panel-title" id="risk-title">清理优先 Top 5</div>
          <div class="panel-sub" id="risk-sub">按当前使用率排序，优先处理告警区</div>
          <div class="list" id="top-risk"></div>
        </div>
        <div class="panel">
          <div class="panel-title" id="surplus-title">可承载 Top 5</div>
          <div class="panel-sub" id="surplus-sub">按剩余率排序，优先看安全区</div>
          <div class="list" id="top-surplus"></div>
        </div>
      </section>

      <section class="tables">
        <div class="panel">
          <div class="panel-title">集群概览</div>
          <div class="panel-sub">按集群汇总风险区、关注区和平均余量</div>
          <div class="table-wrap">
            <table class="data-table" id="cluster-table"></table>
          </div>
        </div>
        <div class="panel">
          <div class="panel-title" id="issues-title">潜在问题清单</div>
          <div class="panel-sub" id="issues-sub">告警和关注项，按风险优先级排序</div>
          <div class="table-wrap">
            <table class="data-table" id="issue-table"></table>
          </div>
        </div>
        <div class="panel">
          <div class="panel-title" id="capacity-title">资源规划清单</div>
          <div class="panel-sub" id="capacity-sub">安全区资源，按余量从高到低排序</div>
          <div class="table-wrap">
            <table class="data-table" id="capacity-table"></table>
          </div>
        </div>
        <div class="panel">
          <div class="panel-title" id="usage-title">当前与剩余</div>
          <div class="panel-sub" id="usage-sub">统一表格展示当前压力、余量和趋势</div>
          <div class="table-wrap">
            <table class="data-table" id="usage-table"></table>
          </div>
        </div>
      </section>
    </div>

    <script src="./core.js?v=20260413b"></script>
    <script src="./app.js?v=20260413b"></script>
  </body>
</html>
