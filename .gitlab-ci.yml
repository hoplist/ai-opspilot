stages:
  - preflight
  - code-precheck
  - test
  - build
  - update-gitops

variables:
  GO_VERSION_IMAGE: "192.168.48.206:5050/platform/opspilot/ci-golang:1.23-alpine"
  BUILDKIT_IMAGE: "192.168.48.206:5050/platform/opspilot/ci-buildkit:rootless"
  ALPINE_IMAGE: "192.168.48.206:5050/platform/opspilot/ci-alpine:3.20"
  IMAGE_NAME: "$CI_REGISTRY_IMAGE/opspilot-core"
  AGENT_IMAGE_NAME: "$CI_REGISTRY_IMAGE/opspilot-agent"
  IMAGE_TAG: "$CI_COMMIT_SHORT_SHA"
  BUILDKIT_CACHE_IMAGE: "$CI_REGISTRY_IMAGE/opspilot-core:buildcache"
  AGENT_BUILDKIT_CACHE_IMAGE: "$CI_REGISTRY_IMAGE/opspilot-agent:buildcache"
  GOFLAGS: "-buildvcs=false"
  GITOPS_REPO: "http://oauth2:${GITOPS_TOKEN}@192.168.48.206:8929/tpo/deploy/gitops-manifests.git"
  GITOPS_PROJECT: "tpo/deploy/gitops-manifests"
  GITLAB_API: "http://192.168.48.206:8929/api/v4"
  GITOPS_APP_PATH: "clusters/test/apps/opspilot-core"
  GITOPS_APP_FILE: "apps/opspilot-core-application.yaml"
  GITOPS_CONTAINER_NAME: "core"

preflight:onboarding:
  stage: preflight
  image:
    name: "$ALPINE_IMAGE"
  script:
    - test -f opspilot/Dockerfile
    - test -f opspilot/Dockerfile.agent
    - grep -Eq 'buildctl-daemonless.sh|BUILDKIT_IMAGE' .gitlab-ci.yml
    - test -f deploy/opspilot/core/deployment.yaml
    - test -f deploy/opspilot/core/service.yaml
    - test -f deploy/opspilot/core/kustomization.yaml
    - "grep -q 'resources:' deploy/opspilot/core/deployment.yaml"
    - "grep -q 'readinessProbe:' deploy/opspilot/core/deployment.yaml"
    - "grep -q 'livenessProbe:' deploy/opspilot/core/deployment.yaml"
  rules:
    - if: $CI_COMMIT_BRANCH

code-precheck:
  stage: code-precheck
  image:
    name: "$GO_VERSION_IMAGE"
  script:
    - go run ./opspilot/cli --output human repo precheck --repo . --project platform/opspilot --write
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - .opspilot/evidence/code-precheck.json
  rules:
    - if: $CI_COMMIT_BRANCH

test:go:
  stage: test
  image:
    name: "$GO_VERSION_IMAGE"
  script:
    - go test ./opspilot/...
  rules:
    - if: $CI_COMMIT_BRANCH

build:binaries:
  stage: build
  image:
    name: "$GO_VERSION_IMAGE"
  script:
    - mkdir -p build/linux-amd64
    - CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags "-s -w" -o build/linux-amd64/opspilot-core ./opspilot/core
    - CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags "-s -w" -o build/linux-amd64/opspilot ./opspilot/cli
    - CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags "-s -w" -o build/linux-amd64/opspilot-agent ./opspilot/agent
  artifacts:
    expire_in: 1 day
    paths:
      - build/linux-amd64/opspilot-core
      - build/linux-amd64/opspilot
      - build/linux-amd64/opspilot-agent
  rules:
    - if: $CI_COMMIT_BRANCH

build:image:
  stage: build
  image:
    name: "$BUILDKIT_IMAGE"
    entrypoint: [""]
  needs:
    - job: build:binaries
      artifacts: true
  variables:
    BUILDKITD_FLAGS: --oci-worker-no-process-sandbox
  before_script:
    - mkdir -p ~/.docker
    - |
      echo "{\"auths\":{\"$CI_REGISTRY\":{\"username\":\"$CI_REGISTRY_USER\",\"password\":\"$CI_REGISTRY_PASSWORD\"}}}" > ~/.docker/config.json
  script:
    - |
      buildctl-daemonless.sh build \
        --frontend dockerfile.v0 \
        --local context=. \
        --local dockerfile=opspilot \
        --opt filename=Dockerfile \
        --import-cache type=registry,ref=$BUILDKIT_CACHE_IMAGE,registry.insecure=true \
        --export-cache type=registry,ref=$BUILDKIT_CACHE_IMAGE,mode=max,registry.insecure=true \
        --output type=image,\"name=$IMAGE_NAME:$IMAGE_TAG,$IMAGE_NAME:$CI_COMMIT_REF_SLUG\",push=true,registry.insecure=true
  rules:
    - if: $CI_COMMIT_BRANCH

build:agent-image:
  stage: build
  image:
    name: "$BUILDKIT_IMAGE"
    entrypoint: [""]
  needs:
    - job: build:binaries
      artifacts: true
  variables:
    BUILDKITD_FLAGS: --oci-worker-no-process-sandbox
  before_script:
    - mkdir -p ~/.docker
    - |
      echo "{\"auths\":{\"$CI_REGISTRY\":{\"username\":\"$CI_REGISTRY_USER\",\"password\":\"$CI_REGISTRY_PASSWORD\"}}}" > ~/.docker/config.json
  script:
    - |
      buildctl-daemonless.sh build \
        --frontend dockerfile.v0 \
        --local context=. \
        --local dockerfile=opspilot \
        --opt filename=Dockerfile.agent \
        --import-cache type=registry,ref=$AGENT_BUILDKIT_CACHE_IMAGE,registry.insecure=true \
        --export-cache type=registry,ref=$AGENT_BUILDKIT_CACHE_IMAGE,mode=max,registry.insecure=true \
        --output type=image,\"name=$AGENT_IMAGE_NAME:$IMAGE_TAG,$AGENT_IMAGE_NAME:$CI_COMMIT_REF_SLUG\",push=true,registry.insecure=true
  rules:
    - if: $CI_COMMIT_BRANCH

update:gitops:
  stage: update-gitops
  image:
    name: "$GO_VERSION_IMAGE"
  needs:
    - job: build:image
    - job: build:agent-image
  script:
    - test -n "$GITOPS_TOKEN"
    - |
      cat > /tmp/gitops_commit.go <<'GO'
      package main

      import (
        "bytes"
        "encoding/json"
        "fmt"
        "io"
        "net/http"
        "net/url"
        "os"
        "path/filepath"
        "strings"
      )

      type action struct {
        Action   string `json:"action"`
        FilePath string `json:"file_path"`
        Content  string `json:"content"`
      }

      func mustEnv(key string) string {
        value := strings.TrimSpace(os.Getenv(key))
        if value == "" {
          panic(key + " is required")
        }
        return value
      }

      func read(path string) string {
        data, err := os.ReadFile(path)
        if err != nil {
          panic(err)
        }
        return string(data)
      }

      func updateCoreImage(body, image string) string {
        lines := strings.Split(body, "\n")
        for i, line := range lines {
          if strings.Contains(line, "image:") && strings.Contains(line, "opspilot-core") {
            prefix := line[:strings.Index(line, "image:")]
            lines[i] = prefix + "image: " + image
          }
        }
        return strings.Join(lines, "\n")
      }

      func main() {
        image := mustEnv("IMAGE_NAME") + ":" + mustEnv("IMAGE_TAG")
        appPath := mustEnv("GITOPS_APP_PATH")
        appFile := mustEnv("GITOPS_APP_FILE")
        actions := []action{
          {Action: "update", FilePath: appPath + "/configmap.yaml", Content: read("deploy/opspilot/core/configmap.yaml")},
          {Action: "update", FilePath: appPath + "/deployment.yaml", Content: updateCoreImage(read("deploy/opspilot/core/deployment.yaml"), image)},
          {Action: "update", FilePath: appPath + "/service.yaml", Content: read("deploy/opspilot/core/service.yaml")},
          {Action: "update", FilePath: appPath + "/kustomization.yaml", Content: strings.ReplaceAll(read("deploy/opspilot/core/kustomization.yaml"), "../rbac", "../opspilot-rbac")},
          {Action: "update", FilePath: appFile, Content: `apiVersion: argoproj.io/v1alpha1
      kind: Application
      metadata:
        name: opspilot-core
        namespace: argocd
      spec:
        project: cicd-apps
        source:
          repoURL: http://192.168.48.206:8929/tpo/deploy/gitops-manifests.git
          targetRevision: main
          path: clusters/test/apps/opspilot-core
        destination:
          server: https://kubernetes.default.svc
          namespace: opspilot
        syncPolicy:
          automated:
            prune: true
            selfHeal: true
          syncOptions:
            - CreateNamespace=true
      `},
        }
        rbacFiles, err := filepath.Glob("deploy/opspilot/rbac/*")
        if err != nil {
          panic(err)
        }
        for _, path := range rbacFiles {
          info, err := os.Stat(path)
          if err != nil || info.IsDir() {
            continue
          }
          actions = append(actions, action{Action: "update", FilePath: "clusters/test/apps/opspilot-rbac/" + filepath.Base(path), Content: read(path)})
        }
        payload := map[string]any{
          "branch":         "main",
          "commit_message": "deploy opspilot-core " + mustEnv("IMAGE_TAG"),
          "actions":        actions,
        }
        body, err := json.Marshal(payload)
        if err != nil {
          panic(err)
        }
        endpoint := strings.TrimRight(mustEnv("GITLAB_API"), "/") + "/projects/" + url.PathEscape(mustEnv("GITOPS_PROJECT")) + "/repository/commits"
        req, err := http.NewRequest(http.MethodPost, endpoint, bytes.NewReader(body))
        if err != nil {
          panic(err)
        }
        req.Header.Set("Content-Type", "application/json")
        req.Header.Set("PRIVATE-TOKEN", mustEnv("GITOPS_TOKEN"))
        resp, err := http.DefaultClient.Do(req)
        if err != nil {
          panic(err)
        }
        defer resp.Body.Close()
        respBody, _ := io.ReadAll(resp.Body)
        if resp.StatusCode < 200 || resp.StatusCode >= 300 {
          panic(fmt.Sprintf("gitops commit failed: %s %s", resp.Status, strings.TrimSpace(string(respBody))))
        }
        fmt.Println("gitops commit submitted")
      }
      GO
      go run /tmp/gitops_commit.go
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
