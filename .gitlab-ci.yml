stages:
  - preflight
  - code-precheck
  - test
  - build
  - update-gitops

variables:
  GO_VERSION_IMAGE: "192.168.48.206:5050/platform/opspilot/ci-golang:1.23-alpine"
  BUILDKIT_IMAGE: "192.168.48.206:5050/platform/opspilot/ci-buildkit:rootless"
  ALPINE_IMAGE: "192.168.48.206:5050/platform/opspilot/ci-alpine:3.20"
  IMAGE_NAME: "$CI_REGISTRY_IMAGE/opspilot-core"
  IMAGE_TAG: "$CI_COMMIT_SHORT_SHA"
  BUILDKIT_CACHE_IMAGE: "$CI_REGISTRY_IMAGE/opspilot-core:buildcache"
  GOFLAGS: "-buildvcs=false"
  GITOPS_REPO: "http://oauth2:${GITOPS_TOKEN}@192.168.48.206:8929/platform/gitops-manifests.git"
  GITOPS_APP_PATH: "clusters/test/apps/opspilot-core"
  GITOPS_APP_FILE: "apps/opspilot-core-application.yaml"
  GITOPS_CONTAINER_NAME: "core"

preflight:onboarding:
  stage: preflight
  image:
    name: "$ALPINE_IMAGE"
  script:
    - test -f opspilot/Dockerfile
    - grep -Eq 'buildctl-daemonless.sh|BUILDKIT_IMAGE' .gitlab-ci.yml
    - test -f deploy/opspilot/core/deployment.yaml
    - test -f deploy/opspilot/core/service.yaml
    - test -f deploy/opspilot/core/kustomization.yaml
    - "grep -q 'resources:' deploy/opspilot/core/deployment.yaml"
    - "grep -q 'readinessProbe:' deploy/opspilot/core/deployment.yaml"
    - "grep -q 'livenessProbe:' deploy/opspilot/core/deployment.yaml"
  rules:
    - if: $CI_COMMIT_BRANCH

code-precheck:
  stage: code-precheck
  image:
    name: "$GO_VERSION_IMAGE"
  script:
    - go run ./opspilot/cli --output human repo precheck --repo . --project platform/opspilot --write
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - .opspilot/evidence/code-precheck.json
  rules:
    - if: $CI_COMMIT_BRANCH

test:go:
  stage: test
  image:
    name: "$GO_VERSION_IMAGE"
  script:
    - go test ./opspilot/...
  rules:
    - if: $CI_COMMIT_BRANCH

build:binaries:
  stage: build
  image:
    name: "$GO_VERSION_IMAGE"
  script:
    - mkdir -p build/linux-amd64
    - CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags "-s -w" -o build/linux-amd64/opspilot-core ./opspilot/core
    - CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags "-s -w" -o build/linux-amd64/opspilot ./opspilot/cli
  artifacts:
    expire_in: 1 day
    paths:
      - build/linux-amd64/opspilot-core
      - build/linux-amd64/opspilot
  rules:
    - if: $CI_COMMIT_BRANCH

build:image:
  stage: build
  image:
    name: "$BUILDKIT_IMAGE"
    entrypoint: [""]
  needs:
    - job: build:binaries
      artifacts: true
  variables:
    BUILDKITD_FLAGS: --oci-worker-no-process-sandbox
  before_script:
    - mkdir -p ~/.docker
    - |
      echo "{\"auths\":{\"$CI_REGISTRY\":{\"username\":\"$CI_REGISTRY_USER\",\"password\":\"$CI_REGISTRY_PASSWORD\"}}}" > ~/.docker/config.json
  script:
    - |
      buildctl-daemonless.sh build \
        --frontend dockerfile.v0 \
        --local context=. \
        --local dockerfile=opspilot \
        --opt filename=Dockerfile \
        --import-cache type=registry,ref=$BUILDKIT_CACHE_IMAGE,registry.insecure=true \
        --export-cache type=registry,ref=$BUILDKIT_CACHE_IMAGE,mode=max,registry.insecure=true \
        --output type=image,\"name=$IMAGE_NAME:$IMAGE_TAG,$IMAGE_NAME:$CI_COMMIT_REF_SLUG\",push=true,registry.insecure=true
  rules:
    - if: $CI_COMMIT_BRANCH

update:gitops:
  stage: update-gitops
  image:
    name: "$GO_VERSION_IMAGE"
  needs:
    - job: build:image
  before_script:
    - git config --global user.email "gitlab-ci@node206.local"
    - git config --global user.name "gitlab-ci"
  script:
    - test -n "$GITOPS_TOKEN"
    - git clone "$GITOPS_REPO" gitops
    - mkdir -p "gitops/$GITOPS_APP_PATH" "gitops/apps"
    - rm -rf gitops/clusters/test/apps/opspilot-rbac
    - rm -rf gitops/clusters/test/apps/opspilot-bootstrap
    - mkdir -p gitops/clusters/test/apps/opspilot-rbac
    - cp -R deploy/opspilot/rbac/. gitops/clusters/test/apps/opspilot-rbac/
    - cp deploy/opspilot/core/configmap.yaml "gitops/$GITOPS_APP_PATH/configmap.yaml"
    - cp deploy/opspilot/core/deployment.yaml "gitops/$GITOPS_APP_PATH/deployment.yaml"
    - cp deploy/opspilot/core/service.yaml "gitops/$GITOPS_APP_PATH/service.yaml"
    - cp deploy/opspilot/core/kustomization.yaml "gitops/$GITOPS_APP_PATH/kustomization.yaml"
    - sed -i 's#../rbac#../opspilot-rbac#g' "gitops/$GITOPS_APP_PATH/kustomization.yaml"
    - |
      sed -i "s#image: .*opspilot-core.*#image: ${IMAGE_NAME}:${IMAGE_TAG}#" "gitops/$GITOPS_APP_PATH/deployment.yaml"
    - |
      cat > "gitops/$GITOPS_APP_FILE" <<EOF
      apiVersion: argoproj.io/v1alpha1
      kind: Application
      metadata:
        name: opspilot-core
        namespace: argocd
      spec:
        project: cicd-apps
        source:
          repoURL: http://192.168.48.206:8929/platform/gitops-manifests.git
          targetRevision: main
          path: clusters/test/apps/opspilot-core
        destination:
          server: https://kubernetes.default.svc
          namespace: opspilot
        syncPolicy:
          automated:
            prune: true
            selfHeal: true
          syncOptions:
            - CreateNamespace=true
      EOF
    - cd gitops
    - git add "$GITOPS_APP_PATH" clusters/test/apps/opspilot-rbac "$GITOPS_APP_FILE"
    - git add -A clusters/test/apps/opspilot-bootstrap || true
    - git commit -m "deploy opspilot-core ${IMAGE_TAG}" || echo "no changes"
    - git push origin main
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
