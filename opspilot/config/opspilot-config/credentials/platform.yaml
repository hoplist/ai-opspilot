credentials:
  - name: opspilot-release-secrets
    class: platform-runtime
    environment: test
    scope: node200/opspilot
    storage: kubernetes-secret
    namespace: opspilot
    used_by:
      - opspilot-core
    permissions:
      - read_gitlab
      - read_registry
      - write_gitops_confirmed
    owner: platform
    rotation: 90d
  - name: opspilot-skills-secrets
    class: platform-runtime
    environment: test
    scope: node200/opspilot-skills
    storage: kubernetes-secret
    namespace: opspilot
    used_by:
      - opspilot-core
      - skills-sync
    permissions:
      - read_gitlab_skills
    owner: platform
    rotation: 90d
  - name: opspilot-config-secrets
    class: platform-runtime
    environment: test
    scope: node200/opspilot-config
    storage: kubernetes-secret
    namespace: opspilot
    used_by:
      - config-sync
    permissions:
      - read_gitlab_config
    owner: platform
    rotation: 90d
  - name: gitlab-registry-pull
    class: image-pull
    environment: test
    scope: node200/namespaces
    storage: kubernetes-secret-or-containerd
    namespace: opspilot
    used_by:
      - opspilot-core
      - generated-services
    permissions:
      - read_registry
    owner: platform
    rotation: 90d
  - name: opspilot-node-agent-secrets
    class: platform-runtime
    environment: test
    scope: node200/opspilot-to-node206-agent
    storage: kubernetes-secret
    namespace: opspilot
    used_by:
      - opspilot-core
    permissions:
      - read_node_agent
    owner: platform
    rotation: 90d
  - name: GITOPS_TOKEN
    class: ci-automation
    environment: test
    scope: node206/tpo/deploy/gitops-manifests
    storage: gitlab-ci-variable
    used_by:
      - tpo/platform/opspilot/opspilot-core
    permissions:
      - write_gitops
    owner: platform
    rotation: 90d
