services:
  gitlab:
    image: docker-hub.tpo.xzoa.com/opspilot/gitlab-ce:18.11.3
    container_name: gitlab
    restart: unless-stopped
    hostname: gitlab.local
    shm_size: "256m"
    ports:
      - "8929:8929"
      - "2224:22"
      - "5050:5050"
    environment:
      GITLAB_OMNIBUS_CONFIG: |
        external_url 'http://${GITLAB_HOST_IP:-192.168.48.206}:8929'
        gitlab_rails['gitlab_shell_ssh_port'] = 2224
        registry_external_url 'http://${GITLAB_HOST_IP:-192.168.48.206}:5050'
        nginx['listen_port'] = 8929
        nginx['listen_https'] = false
        registry_nginx['listen_port'] = 5050
        registry_nginx['listen_https'] = false
    volumes:
      - /data/gitlab/config:/etc/gitlab
      - /data/gitlab/logs:/var/log/gitlab
      - /data/gitlab/data:/var/opt/gitlab
    healthcheck:
      test: ["CMD-SHELL", "gitlab-healthcheck --fail --max-time 10 || exit 1"]
      interval: 60s
      timeout: 15s
      retries: 5
      start_period: 300s
