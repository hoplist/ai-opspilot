global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 15s
  external_labels:
    source: node206-host
    env: external

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - 127.0.0.1:9090
        labels:
          host: node206
          role: prometheus

  - job_name: node206-node-exporter
    static_configs:
      - targets:
          - 127.0.0.1:9100
        labels:
          host: node206
          role: host

  - job_name: node206-cadvisor
    static_configs:
      - targets:
          - 127.0.0.1:8080
        labels:
          host: node206
          role: docker
