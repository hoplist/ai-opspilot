apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: opspilot-prometheus
  namespace: argocd
spec:
  project: monitoring
  source:
    repoURL: http://192.168.48.206:8929/platform/gitops-manifests.git
    targetRevision: main
    path: clusters/test/apps/opspilot-prometheus
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
