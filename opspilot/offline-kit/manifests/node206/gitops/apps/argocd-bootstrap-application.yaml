apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-bootstrap
  namespace: argocd
spec:
  project: argocd-bootstrap
  source:
    repoURL: 'http://192.168.48.206:8929/platform/gitops-manifests.git'
    targetRevision: main
    path: clusters/test/argocd-bootstrap
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
