apiVersion: v1
kind: ConfigMap
metadata:
  name: opspilot-core-config
  namespace: opspilot
  labels:
    app.kubernetes.io/name: opspilot-core
    app.kubernetes.io/part-of: opspilot
data:
  OPSPILOT_PORT: "18080"
  OPSPILOT_CONFIG_DIR: "/etc/opspilot/config/current"
  OPSPILOT_CONFIG_RELOAD_SECONDS: "60"
  OPSPILOT_CONFIG_GIT_URL: "http://192.168.48.206:8929/platform/opspilot-config.git"
  OPSPILOT_CONFIG_GIT_REF: "main"
  OPSPILOT_CONFIG_SYNC_SECONDS: "60"
  OPSPILOT_AUDIT_LOG_PATH: "/var/lib/opspilot/audit/audit.jsonl"
  OPSPILOT_AUDIT_MAX_BYTES: "33554432"
  OPSPILOT_AUDIT_RETENTION_DAYS: "7"
  OPSPILOT_EVIDENCE_PACK_DIR: "/var/lib/opspilot/evidence-packs"
  OPSPILOT_EVIDENCE_PACK_MAX_BYTES: "100663296"
  OPSPILOT_EVIDENCE_PACK_MAX_ITEMS: "200"
  OPSPILOT_EVIDENCE_PACK_RETENTION_DAYS: "3"
  OPSPILOT_ERROR_EVENT_MAX_BYTES: "33554432"
  OPSPILOT_ERROR_EVENT_MAX_ITEMS: "100"
  OPSPILOT_ERROR_EVENT_RETENTION_DAYS: "3"
  OPSPILOT_EVENT_PACK_ENABLED: "true"
  OPSPILOT_EVENT_PACK_INTERVAL_SECONDS: "300"
  OPSPILOT_RETENTION_CLEANUP_INTERVAL_SECONDS: "300"
  OPSPILOT_SKILLS_DYNAMIC_ENABLED: "1"
  OPSPILOT_SKILLS_DIR: "/opt/opspilot/skills/current/skills"
  OPSPILOT_SKILLS_FALLBACK_ENABLED: "1"
  OPSPILOT_SKILLS_FALLBACK_DIR: "/opt/opspilot/fallback-skills/skills"
  OPSPILOT_SKILLS_GIT_URL: "http://192.168.48.206:8929/platform/opspilot-skills.git"
  OPSPILOT_SKILLS_GIT_REF: "main"
  OPSPILOT_SKILLS_SYNC_SECONDS: "60"
