openapi: 3.1.0
info:
  title: OpsPilot Core API
  version: 0.1.0-draft
  description: Draft read-only API contract for OpsPilot.
paths:
  /api/health:
    get:
      summary: Health check
      responses:
        "200":
          description: OK
  /api/capabilities:
    get:
      summary: Return available and missing troubleshooting evidence sources
      responses:
        "200":
          description: Capability status, available evidence, and missing evidence
  /api/skills/registry:
    get:
      summary: Return OpsPilot skill registry and AI routing metadata
      parameters:
        - name: category
          in: query
          schema:
            type: string
            description: Optional skill category filter
        - name: integrated_only
          in: query
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Integrated Codex skills mapped to OpsPilot command and evidence surfaces
  /api/skills/validate:
    get:
      summary: Validate the server-side OpsPilot skills repository
      responses:
        "200":
          description: Validation result for runtime skills
  /api/skills/sources:
    get:
      summary: Return mirrored upstream skill sources and inventory counts
      responses:
        "200":
          description: Skills mirror sources, registry path, candidates, and unsupported counts
  /api/skills/candidates:
    get:
      summary: Return mirrored skill candidates and unsupported entries
      responses:
        "200":
          description: Candidate skills that require review before runtime promotion
  /api/skills/import-plan:
    get:
      summary: Generate a dry-run import plan for one mirrored skill candidate
      parameters:
        - name: name
          in: query
          required: true
          schema:
            type: string
            description: Candidate skill name, for example gstack-health
      responses:
        "200":
          description: Reviewable generated skill files and next steps; no server-side write is performed
  /api/skills/discover:
    get:
      summary: Discover mirrored skill candidates and score OpsPilot runtime suitability
      parameters:
        - name: include_unsupported
          in: query
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Candidate review pipeline with scores, decisions, blockers, and next steps
  /api/skills/review:
    get:
      summary: Review one mirrored candidate before import-plan or promotion
      parameters:
        - name: name
          in: query
          required: true
          schema:
            type: string
            description: Candidate skill name
      responses:
        "200":
          description: Suitability score, decision, blockers, missing mappings, and next steps
  /api/inventory/overview:
    get:
      summary: Return inventory overview
      responses:
        "200":
          description: Inventory overview
  /api/assets/zones:
    get:
      summary: List advisory-only asset network zones
      responses:
        "200":
          description: Network zones used to classify server IPs
  /api/assets/catalog:
    get:
      summary: Return asset catalog foundation
      responses:
        "200":
          description: Network zones, planned asset sources, manual assets, and counts
  /api/assets/inspect:
    get:
      summary: Classify one IP and report missing asset evidence
      parameters:
        - name: ip
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: IP zone match, related sources, findings, and advice
  /api/assets/diff:
    get:
      summary: Return advisory-only asset gaps and removal candidates
      responses:
        "200":
          description: Findings that do not mutate JumpServer or Prometheus
  /api/errors/recent:
    get:
      summary: Return recent AI-readable error events
      parameters:
        - name: source
          in: query
          schema:
            type: string
            enum:
              - kubernetes
              - argocd
              - release
              - middleware
        - name: service
          in: query
          schema:
            type: string
        - name: namespace
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Structured error events for OpsPilot and AI assistants
  /api/metrics/health:
    get:
      summary: Return Prometheus datasource reachability from OpsPilot Core
      responses:
        "200":
          description: Prometheus health
  /api/metrics/datasources:
    get:
      summary: List configured Prometheus datasources
      responses:
        "200":
          description: Prometheus datasources and reachability
  /api/metrics/query:
    get:
      summary: Run a read-only PromQL instant query
      parameters:
        - name: source
          in: query
          schema:
            type: string
            description: Prometheus datasource name, or all
        - name: query
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: PromQL vector result
  /api/metrics/nodes:
    get:
      summary: Return node CPU, memory, and filesystem usage
      parameters:
        - name: source
          in: query
          schema:
            type: string
            description: Prometheus datasource name, or all
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Node metrics
  /api/metrics/pods:
    get:
      summary: Return Pod CPU and memory usage
      parameters:
        - name: source
          in: query
          schema:
            type: string
            description: Prometheus datasource name, or all
        - name: namespace
          in: query
          schema:
            type: string
        - name: sort
          in: query
          schema:
            type: string
            enum:
              - cpu
              - memory
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Pod metrics
  /api/metrics/containers:
    get:
      summary: Return Docker/container CPU and memory usage
      parameters:
        - name: source
          in: query
          schema:
            type: string
            description: Prometheus datasource name, or all
        - name: sort
          in: query
          schema:
            type: string
            enum:
              - cpu
              - memory
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Container metrics from cAdvisor
  /api/metrics/pod:
    get:
      summary: Return metrics for one Pod
      parameters:
        - name: source
          in: query
          schema:
            type: string
            description: Prometheus datasource name
        - name: namespace
          in: query
          required: true
          schema:
            type: string
        - name: pod
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Single Pod metrics
  /api/profiles/datasources:
    get:
      summary: Return optional Parca profile datasource readiness
      responses:
        "200":
          description: Parca datasource readiness and missing profile evidence
  /api/profiles/status:
    get:
      summary: Return optional Parca profile datasource status
      responses:
        "200":
          description: Parca status; missing or unreachable Parca does not block other evidence
  /api/profiles/link:
    get:
      summary: Generate a Parca UI query link
      parameters:
        - name: source
          in: query
          schema:
            type: string
        - name: service
          in: query
          schema:
            type: string
        - name: namespace
          in: query
          schema:
            type: string
        - name: pod
          in: query
          schema:
            type: string
        - name: since
          in: query
          schema:
            type: string
            default: 10m
      responses:
        "200":
          description: Profile datasource, query, URL, or missing profile evidence
  /api/flows/catalog:
    get:
      summary: Return configured business flow evidence chains
      responses:
        "200":
          description: Flow catalog loaded from OpsPilot config
  /api/flows/inspect:
    get:
      summary: Inspect configured flow stages and evidence gaps
      parameters:
        - name: name
          in: query
          schema:
            type: string
        - name: stage
          in: query
          schema:
            type: string
        - name: window
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Flow stage metadata and missing evidence; first phase does not query remote datasources
  /api/k8s/pods:
    get:
      summary: List Kubernetes Pods
      parameters:
        - name: namespace
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
        - name: q
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Pod list
  /api/k8s/logs/pod:
    get:
      summary: Read Pod logs, defaulting to a 10-hour troubleshooting window
      parameters:
        - name: namespace
          in: query
          required: true
          schema:
            type: string
        - name: pod
          in: query
          required: true
          schema:
            type: string
        - name: container
          in: query
          schema:
            type: string
        - name: tail_lines
          in: query
          schema:
            type: integer
            default: 300
            maximum: 1000
        - name: since_seconds
          in: query
          schema:
            type: integer
            default: 36000
            maximum: 86400
        - name: limit_bytes
          in: query
          schema:
            type: integer
            default: 1048576
            maximum: 5242880
        - name: previous
          in: query
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Pod logs
  /api/node-agents:
    get:
      summary: List configured Docker node agents
      responses:
        "200":
          description: Node agent reachability
  /api/docker/containers:
    get:
      summary: List allowed Docker containers through node agents
      parameters:
        - name: host
          in: query
          schema:
            type: string
            description: Node agent host, or all
      responses:
        "200":
          description: Docker container list
  /api/docker/inspect:
    get:
      summary: Return read-only Docker inspect summary
      parameters:
        - name: host
          in: query
          schema:
            type: string
        - name: container
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Docker inspect summary
  /api/docker/logs:
    get:
      summary: Read short-window Docker container logs
      parameters:
        - name: host
          in: query
          schema:
            type: string
        - name: container
          in: query
          required: true
          schema:
            type: string
        - name: tail_lines
          in: query
          schema:
            type: integer
            default: 300
            maximum: 1000
        - name: since_seconds
          in: query
          schema:
            type: integer
            default: 1800
            maximum: 86400
        - name: limit_bytes
          in: query
          schema:
            type: integer
            default: 1048576
            maximum: 5242880
      responses:
        "200":
          description: Docker container logs
  /api/docker/stats:
    get:
      summary: Return one-shot Docker container stats
      parameters:
        - name: host
          in: query
          schema:
            type: string
        - name: container
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Docker container stats
  /api/host/disk:
    get:
      summary: Return read-only host disk evidence from a node agent
      parameters:
        - name: host
          in: query
          schema:
            type: string
            description: Node agent host, or all
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
        - name: depth
          in: query
          schema:
            type: integer
            default: 2
            maximum: 4
      responses:
        "200":
          description: Filesystem capacity, allowed path usage, Docker disk summary, container log sizes, and plan-only cleanup recommendations
  /api/host/network:
    get:
      summary: Return short read-only host network evidence from a node agent
      parameters:
        - name: host
          in: query
          schema:
            type: string
            description: Node agent host, or all
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
        - name: duration
          in: query
          schema:
            type: integer
            default: 5
            maximum: 30
            description: Sample duration in seconds
      responses:
        "200":
          description: Interface RX/TX rates, allowed Docker container RX/TX rates, and TCP state counts
  /api/logs/search:
    get:
      summary: Search collected Kubernetes logs
      parameters:
        - name: namespace
          in: query
          schema:
            type: string
        - name: pod
          in: query
          schema:
            type: string
        - name: container
          in: query
          schema:
            type: string
        - name: q
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
        - name: since
          in: query
          schema:
            type: integer
            default: 1800
            maximum: 7200
            description: Look back seconds
      responses:
        "200":
          description: Log search results
  /api/logs/route:
    get:
      summary: Explain the ordered datasource route for log investigation
      parameters:
        - name: service
          in: query
          schema:
            type: string
            description: Service catalog name
        - name: host
          in: query
          schema:
            type: string
            description: Gateway host/domain
        - name: cluster
          in: query
          schema:
            type: string
            description: Cluster catalog name
        - name: region
          in: query
          schema:
            type: string
            description: Region name
        - name: global
          in: query
          schema:
            type: boolean
            default: false
            description: Include all log datasources after exact, cluster, and regional candidates
      responses:
        "200":
          description: Ordered ES/OpenSearch candidates, Kibana UI metadata, query limits, and evidence gaps
  /api/evidence/request:
    get:
      summary: Correlate APISIX access logs with service logs for one request shape
      parameters:
        - name: host
          in: query
          schema:
            type: string
            description: Gateway host/domain, for example workflow.tpo.xzoa.com. Optional for service-only investigation.
        - name: uri
          in: query
          required: true
          schema:
            type: string
            description: Request URI to match in APISIX logs
        - name: at
          in: query
          schema:
            type: string
            description: Center time as RFC3339 or yyyy-mm-dd HH:MM[:SS]
        - name: since_seconds
          in: query
          schema:
            type: integer
            default: 900
            description: Lookback window when at is empty
        - name: window_seconds
          in: query
          schema:
            type: integer
            default: 300
            description: Seconds before and after at
        - name: include_options
          in: query
          schema:
            type: boolean
            default: false
            description: Include CORS OPTIONS requests
        - name: skip_apisix
          in: query
          schema:
            type: boolean
            default: false
            description: Skip APISIX lookup and continue with service logs only
        - name: apisix_index
          in: query
          schema:
            type: string
            description: Override APISIX index pattern
        - name: service_index
          in: query
          schema:
            type: string
            description: Override service log index pattern
        - name: service_uri_field
          in: query
          schema:
            type: string
            description: Override service log field containing URI text
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        "200":
          description: Evidence chain with APISIX latency summary, service log matches, strength, and gaps
  /api/context/pod:
    get:
      summary: Return Pod Evidence Pack
      parameters:
        - name: source
          in: query
          schema:
            type: string
            description: Prometheus datasource name for metric evidence
        - name: namespace
          in: query
          required: true
          schema:
            type: string
        - name: pod
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Pod Evidence Pack
  /api/diagnose/pod:
    get:
      summary: Diagnose a Pod from MVP evidence
      parameters:
        - name: source
          in: query
          schema:
            type: string
            description: Prometheus datasource name for metric evidence
        - name: namespace
          in: query
          required: true
          schema:
            type: string
        - name: pod
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Pod diagnosis
  /api/release/status:
    get:
      summary: Return read-only release evidence status for one configured service
      parameters:
        - name: service
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Release evidence status
  /api/release/jobs:
    get:
      summary: List GitLab jobs from the latest pipeline for one configured release service
      parameters:
        - name: service
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: GitLab pipeline job list
  /api/release/trigger:
    post:
      summary: Trigger a GitLab pipeline for one configured release service
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - service
              properties:
                service:
                  type: string
                ref:
                  type: string
                  default: main
      responses:
        "200":
          description: Submitted GitLab pipeline
  /api/repo/upload-target:
    post:
      summary: Create or reuse the allowed GitLab target project for repo upload
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - target_project
              properties:
                target_project:
                  type: string
                  description: Full GitLab project path under an allowed upload base
                no_reuse:
                  type: boolean
                  default: false
                  description: Fail if the target project already exists
      responses:
        "200":
          description: GitLab project metadata without returning tokens
  /api/release/logs:
    get:
      summary: Read bounded GitLab job trace logs for one configured release service
      parameters:
        - name: service
          in: query
          required: true
          schema:
            type: string
        - name: job
          in: query
          schema:
            type: string
        - name: job_id
          in: query
          schema:
            type: integer
        - name: tail
          in: query
          schema:
            type: integer
            default: 200
        - name: limit_bytes
          in: query
          schema:
            type: integer
            default: 131072
      responses:
        "200":
          description: GitLab job trace tail
  /api/diagnose/docker:
    get:
      summary: Diagnose a Docker container from node-agent evidence
      parameters:
        - name: host
          in: query
          schema:
            type: string
        - name: container
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Docker container diagnosis
