stages:
  - preflight
  - code-precheck
  - test
  - build
  - update-gitops

variables:
  GO_VERSION_IMAGE: "192.168.48.206:5050/platform/opspilot/ci-golang:1.23-alpine"
  BUILDKIT_IMAGE: "192.168.48.206:5050/platform/opspilot/ci-buildkit:rootless"
  ALPINE_IMAGE: "192.168.48.206:5050/platform/opspilot/ci-alpine:3.20"
  APP_NAME: "$CI_PROJECT_NAME"
  BUILD_ENTRY: "./cmd/$CI_PROJECT_NAME"
  BUILD_OUTPUT: "build/$CI_PROJECT_NAME"
  DOCKERFILE_PATH: "Dockerfile"
  GITOPS_REPO: "http://oauth2:${GITOPS_TOKEN}@192.168.48.206:8929/platform/gitops-manifests.git"
  GITOPS_APP_PATH: "clusters/test/apps/$CI_PROJECT_NAME"
  GITOPS_APP_FILE: "apps/$CI_PROJECT_NAME-application.yaml"
  GITOPS_CONTAINER_NAME: "$CI_PROJECT_NAME"
  ARGOCD_APP_NAME: "$CI_PROJECT_NAME"
  DEPLOY_NAMESPACE: "$CI_PROJECT_NAME"
  REGISTRY_INSECURE: "true"

preflight:onboarding:
  stage: preflight
  image:
    name: "$ALPINE_IMAGE"
  script:
    - test -f "$DOCKERFILE_PATH"
    - test -f deploy/k8s/namespace.yaml
    - test -f deploy/k8s/limitrange.yaml
    - test -f deploy/k8s/resourcequota.yaml
    - test -f deploy/k8s/deployment.yaml
    - test -f deploy/k8s/service.yaml
    - test -f deploy/k8s/kustomization.yaml
    - "grep -q 'kind: LimitRange' deploy/k8s/limitrange.yaml"
    - "grep -q 'kind: ResourceQuota' deploy/k8s/resourcequota.yaml"
    - "grep -q 'resources:' deploy/k8s/deployment.yaml"
    - "grep -q 'requests:' deploy/k8s/deployment.yaml"
    - "grep -q 'limits:' deploy/k8s/deployment.yaml"
    - "grep -q 'readinessProbe:' deploy/k8s/deployment.yaml"
    - "grep -q 'livenessProbe:' deploy/k8s/deployment.yaml"
    - grep -Eq 'buildkit-gitops|buildctl-daemonless.sh|BUILDKIT_IMAGE' .gitlab-ci.yml
  rules:
    - if: $CI_COMMIT_BRANCH

code-precheck:
  stage: code-precheck
  image:
    name: "$ALPINE_IMAGE"
  before_script:
    - apk add --no-cache python3
  script:
    - mkdir -p .opspilot/evidence
    - |
      python3 - <<'PY'
      import json
      import os
      import re
      import sys

      skip_dirs = {'.git', '.opspilot', 'node_modules', 'vendor', 'dist', 'build', 'target', '.next', '.venv', 'venv', '__pycache__', 'coverage', '.pytest_cache', 'ci', 'docs', 'gitops-manifests-work'}
      exts = {'.go', '.js', '.jsx', '.ts', '.tsx', '.py', '.java', '.kt', '.php', '.cs', '.sql', '.yml', '.yaml', '.properties', '.toml'}
      basenames = {'dockerfile', '.env', '.env.example', 'application.yml', 'application.yaml', 'application.properties'}
      items = []

      def add(rule, severity, category, path, line_no, message, line, skill, recommendation):
          items.append({
              'id': rule,
              'severity': severity,
              'category': category,
              'path': path,
              'line': line_no,
              'message': message,
              'snippet': ' '.join(line.strip().split())[:160],
              'skill': skill,
              'recommendation': recommendation,
          })

      def should_scan(path):
          norm = path.replace('\\', '/')
          if norm.startswith('./deploy/') or norm.startswith('./ci/') or norm.startswith('./docs/') or '/test/' in norm or '/tests/' in norm or '/fixtures/' in norm:
              return False
          base = os.path.basename(path).lower()
          if base in ['.gitlab-ci.yml', 'opspilot.service.yaml', 'opspilot.namespaces.yaml', 'opspilot.release-service.txt'] or base.endswith('_test.go') or base.endswith('.test.js') or base.endswith('.test.ts') or base.endswith('.spec.js') or base.endswith('.spec.ts'):
              return False
          return base in basenames or os.path.splitext(base)[1] in exts

      def looks_like_secret(line):
          lower = line.lower()
          if not any(key in lower for key in ['password', 'passwd', 'secret', 'token', 'access_key', 'accesskey', 'api_key', 'apikey', 'private_key']):
              return False
          if ':' not in line and '=' not in line:
              return False
          if re.search(r'(\$\{|env\.|env\(|getenv|os\.getenv|secretref|valuefrom|example|placeholder|changeme|your_|<|xxx|token_or_api|missing|source_skill_path|image_pull_secret|pull_secret|settings\.|qualitysettings\.)', line, re.I):
              return False
          value = re.split(r'[:=]', line, maxsplit=1)[1].strip().strip("\"', ")
          if len(value) < 16 or any(ch in value for ch in '()[]{}') or ' ' in value:
              return False
          return value.startswith(('glpat-', 'sk-')) or re.match(r'^[A-Za-z0-9_./+=:-]{16,}$', value) is not None

      for root, dirs, files in os.walk('.'):
          dirs[:] = [d for d in dirs if d not in skip_dirs]
          for name in files:
              path = os.path.join(root, name)
              if not should_scan(path):
                  continue
              try:
                  text = open(path, encoding='utf-8', errors='ignore').read()
              except OSError:
                  continue
              for idx, line in enumerate(text.splitlines(), 1):
                  raw = line.strip()
                  if not raw or raw.startswith('//') or raw.startswith('#'):
                      continue
                  lower = raw.lower()
                  sql = ' '.join(lower.split())
                  if any(marker in lower for marker in ['codeprecheckfinding(', 'regexp.mustcompile(', 'containsany(', 'strings.contains(lower,', 'containsdangerousshellline(', 'add("', "add('"]):
                      continue
                  if looks_like_secret(raw):
                      add('secret_leak', 'blocker', 'security', path, idx, 'possible hardcoded secret or token', raw, 'security-reviewer', 'Move the value to GitLab/Kubernetes Secret and rotate it if it is real.')
                  elif 'rm -rf /' in lower or re.search(r'(curl|wget)\s+.*\|\s*(sh|bash)', lower) or 'mkfs.' in lower:
                      add('dangerous_shell', 'blocker', 'security', path, idx, 'dangerous shell execution detected', raw, 'security-reviewer', 'Remove shell execution or replace it with a bounded reviewed command.')
                  elif re.search(r'\b(drop|truncate)\s+(table|database|schema)\b', sql):
                      add('db_destructive_sql', 'blocker', 'database', path, idx, 'destructive SQL detected', raw, 'database-optimizer', 'Move destructive operations to an explicit migration/admin workflow with safeguards.')
                  elif re.search(r'\b(update\s+[a-zA-Z0-9_."`]+\s+set|delete\s+from\s+[a-zA-Z0-9_."`]+)\b', sql) and ' where ' not in sql:
                      add('db_unguarded_write', 'blocker', 'database', path, idx, 'UPDATE/DELETE without a visible WHERE guard', raw, 'database-optimizer', 'Add a guarded WHERE condition and verify affected rows.')
                  elif any(x in lower for x in ['query', 'search', 'list', 'get']) and any(x in lower for x in ['.save(', '.create(', '.insert(', '.update(', '.delete(', 'delete from', 'update ']):
                      add('api_query_writes_data', 'blocker', 'code', path, idx, 'query-style handler appears to write data', raw, 'code-reviewer', 'Separate read and write paths or change handler semantics.')
                  elif any(x in lower for x in ['writefile', 'create(', 'openfile', 'write(']) and any(x in lower for x in ['/logs', '/upload', '/uploads', '/runtime', 'log_dir', 'upload_dir', 'runtime_dir']):
                      add('unbounded_file_write', 'blocker', 'storage', path, idx, 'possible unbounded write to logs/uploads/runtime path', raw, 'code-reviewer', 'Add file size, type, retention, and path validation before writing.')
                  elif ('select *' in sql and ' where ' not in sql and ' limit ' not in sql) or re.search(r'\b(findall|find_all|all\(\))\b', sql):
                      add('db_full_table_read', 'warning', 'database', path, idx, 'possible full-table read without pagination or filtering', raw, 'database-optimizer', 'Add WHERE, LIMIT, or pagination and verify indexes.')
                  elif any(x in lower for x in ['http.get(', 'http.post(', 'requests.get(', 'requests.post(', 'new resttemplate', 'webclient.create(']) and 'timeout' not in lower:
                      add('missing_timeout_hint', 'warning', 'reliability', path, idx, 'outbound client call may need an explicit timeout', raw, 'code-reviewer', 'Configure request/database/client timeout to avoid stuck workers.')

      blockers = sum(1 for item in items if item['severity'] == 'blocker')
      warnings = sum(1 for item in items if item['severity'] == 'warning')
      payload = {
          'service': os.environ.get('APP_NAME') or os.environ.get('CI_PROJECT_NAME', ''),
          'project': os.environ.get('CI_PROJECT_PATH', ''),
          'status': 'blocker' if blockers else ('warn' if warnings else 'pass'),
          'ready': blockers == 0,
          'summary': {'blockers': blockers, 'warnings': warnings, 'passed': 0},
          'items': items,
          'skills': ['code-reviewer', 'security-reviewer', 'secure-code-guardian', 'database-optimizer', 'debugging-wizard'],
          'next': ['fix blocker findings before BuildKit packaging'] if blockers else ['continue to language tests and BuildKit packaging'],
      }
      os.makedirs('.opspilot/evidence', exist_ok=True)
      with open('.opspilot/evidence/code-precheck.json', 'w', encoding='utf-8') as f:
          json.dump(payload, f, ensure_ascii=False, indent=2)
          f.write('\n')
      print(f"code-precheck status={payload['status']} blockers={blockers} warnings={warnings}")
      sys.exit(1 if blockers else 0)
      PY
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - .opspilot/evidence/code-precheck.json
  rules:
    - if: $CI_COMMIT_BRANCH

test:go:
  stage: test
  image:
    name: "$GO_VERSION_IMAGE"
  before_script:
    - apk add --no-cache git
  script:
    - go test ./...
  rules:
    - if: $CI_COMMIT_BRANCH

build:binaries:
  stage: build
  image:
    name: "$GO_VERSION_IMAGE"
  before_script:
    - apk add --no-cache git
  script:
    - mkdir -p "$(dirname "$BUILD_OUTPUT")"
    - CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags "-s -w" -o "$BUILD_OUTPUT" "$BUILD_ENTRY"
  artifacts:
    expire_in: 1 day
    paths:
      - "$BUILD_OUTPUT"
  rules:
    - if: $CI_COMMIT_BRANCH

build:image:
  stage: build
  image:
    name: "$BUILDKIT_IMAGE"
    entrypoint: [""]
  needs:
    - job: build:binaries
      artifacts: true
  variables:
    BUILDKITD_FLAGS: --oci-worker-no-process-sandbox
    IMAGE_NAME: "$CI_REGISTRY_IMAGE/$APP_NAME"
    IMAGE_TAG: "$CI_COMMIT_SHORT_SHA"
    BUILDKIT_CACHE_IMAGE: "$CI_REGISTRY_IMAGE/$APP_NAME:buildcache"
  before_script:
    - mkdir -p ~/.docker
    - |
      echo "{\"auths\":{\"$CI_REGISTRY\":{\"username\":\"$CI_REGISTRY_USER\",\"password\":\"$CI_REGISTRY_PASSWORD\"}}}" > ~/.docker/config.json
  script:
    - |
      buildctl-daemonless.sh build \
        --frontend dockerfile.v0 \
        --local context=. \
        --local dockerfile=. \
        --opt filename="$DOCKERFILE_PATH" \
        --opt build-arg:HTTP_PROXY="${HTTP_PROXY:-}" \
        --opt build-arg:HTTPS_PROXY="${HTTPS_PROXY:-}" \
        --opt build-arg:NO_PROXY="${NO_PROXY:-}" \
        --import-cache type=registry,ref="$BUILDKIT_CACHE_IMAGE",registry.insecure="$REGISTRY_INSECURE" \
        --export-cache type=registry,ref="$BUILDKIT_CACHE_IMAGE",mode=max,registry.insecure="$REGISTRY_INSECURE" \
        --output type=image,"name=$IMAGE_NAME:$IMAGE_TAG",push=true,registry.insecure="$REGISTRY_INSECURE"
  rules:
    - if: $CI_COMMIT_BRANCH

update:gitops:
  stage: update-gitops
  image:
    name: "$ALPINE_IMAGE"
  needs:
    - job: build:image
  variables:
    IMAGE_NAME: "$CI_REGISTRY_IMAGE/$APP_NAME"
    IMAGE_TAG: "$CI_COMMIT_SHORT_SHA"
  before_script:
    - apk add --no-cache git yq
    - git config --global user.email "gitlab-ci@node206.local"
    - git config --global user.name "gitlab-ci"
  script:
    - test -n "$GITOPS_TOKEN"
    - git clone "$GITOPS_REPO" gitops
    - rm -rf "gitops/$GITOPS_APP_PATH"
    - mkdir -p "gitops/$GITOPS_APP_PATH" "gitops/apps"
    - cp -R deploy/k8s/. "gitops/$GITOPS_APP_PATH/"
    - yq -i '(.spec.template.spec.containers[] | select(.name == strenv(GITOPS_CONTAINER_NAME)).image) = strenv(IMAGE_NAME) + ":" + strenv(IMAGE_TAG)' "gitops/$GITOPS_APP_PATH/deployment.yaml"
    - |
      cat > "gitops/$GITOPS_APP_FILE" <<EOF
      apiVersion: argoproj.io/v1alpha1
      kind: Application
      metadata:
        name: ${ARGOCD_APP_NAME}
        namespace: argocd
      spec:
        project: cicd-apps
        source:
          repoURL: http://192.168.48.206:8929/platform/gitops-manifests.git
          targetRevision: main
          path: ${GITOPS_APP_PATH}
        destination:
          server: https://kubernetes.default.svc
          namespace: ${DEPLOY_NAMESPACE}
        syncPolicy:
          automated:
            prune: true
            selfHeal: true
          syncOptions:
            - CreateNamespace=true
      EOF
    - |
      if [ ! -f gitops/apps/kustomization.yaml ]; then
        printf "resources:\n" > gitops/apps/kustomization.yaml
      fi
      app_file="$(basename "$GITOPS_APP_FILE")"
      grep -qxF "  - ${app_file}" gitops/apps/kustomization.yaml || printf "  - %s\n" "$app_file" >> gitops/apps/kustomization.yaml
    - cd gitops
    - git add "$GITOPS_APP_PATH" "$GITOPS_APP_FILE" apps/kustomization.yaml
    - git commit -m "deploy ${APP_NAME} ${IMAGE_TAG}" || echo "no changes"
    - git push origin main
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
