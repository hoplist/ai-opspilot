apiVersion: batch/v1
kind: CronJob
metadata:
  name: opspilot-namespace-bootstrap
  namespace: opspilot
  labels:
    app.kubernetes.io/name: opspilot-namespace-bootstrap
    app.kubernetes.io/part-of: opspilot
spec:
  schedule: "*/2 * * * *"
  concurrencyPolicy: Replace
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 120
      backoffLimit: 1
      ttlSecondsAfterFinished: 600
      template:
        metadata:
          labels:
            app.kubernetes.io/name: opspilot-namespace-bootstrap
            app.kubernetes.io/part-of: opspilot
        spec:
          serviceAccountName: opspilot-namespace-bootstrap
          imagePullSecrets:
            - name: gitlab-registry-pull
          restartPolicy: OnFailure
          containers:
            - name: namespace-bootstrap
              image: placeholder
              imagePullPolicy: IfNotPresent
              env:
                - name: SOURCE_NAMESPACE
                  value: opspilot
                - name: SOURCE_SECRET
                  value: gitlab-registry-pull
                - name: TARGET_SELECTOR
                  value: opspilot.io/managed=true
              command:
                - /usr/local/bin/opspilot
                - bootstrap
                - namespace-secrets
