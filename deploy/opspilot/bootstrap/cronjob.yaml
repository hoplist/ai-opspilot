apiVersion: batch/v1
kind: CronJob
metadata:
  name: opspilot-namespace-bootstrap
  namespace: opspilot
  labels:
    app.kubernetes.io/name: opspilot-namespace-bootstrap
    app.kubernetes.io/part-of: opspilot
spec:
  schedule: "*/2 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 600
      template:
        metadata:
          labels:
            app.kubernetes.io/name: opspilot-namespace-bootstrap
            app.kubernetes.io/part-of: opspilot
        spec:
          serviceAccountName: opspilot-namespace-bootstrap
          restartPolicy: OnFailure
          containers:
            - name: sync-registry-pull-secret
              image: m.daocloud.io/docker.io/bitnami/kubectl:1.29.9
              imagePullPolicy: IfNotPresent
              env:
                - name: SOURCE_NAMESPACE
                  value: opspilot
                - name: SOURCE_SECRET
                  value: gitlab-registry-pull
                - name: TARGET_SELECTOR
                  value: opspilot.io/managed=true
              command:
                - /bin/sh
                - -ec
                - |
                  payload="$(kubectl -n "$SOURCE_NAMESPACE" get secret "$SOURCE_SECRET" -o jsonpath='{.data.\.dockerconfigjson}')"
                  if [ -z "$payload" ]; then
                    echo "source secret $SOURCE_NAMESPACE/$SOURCE_SECRET is missing .dockerconfigjson"
                    exit 1
                  fi

                  kubectl get namespaces -l "$TARGET_SELECTOR" -o jsonpath='{range .items[*]}{.metadata.name}{"\n"}{end}' |
                  while IFS= read -r namespace; do
                    [ -n "$namespace" ] || continue
                    cat <<EOF | kubectl apply -f -
                  apiVersion: v1
                  kind: Secret
                  metadata:
                    name: gitlab-registry-pull
                    namespace: ${namespace}
                    labels:
                      app.kubernetes.io/name: opspilot-namespace-bootstrap
                      app.kubernetes.io/part-of: opspilot
                      opspilot.io/managed: "true"
                    annotations:
                      opspilot.io/source-secret: ${SOURCE_NAMESPACE}/${SOURCE_SECRET}
                  type: kubernetes.io/dockerconfigjson
                  data:
                    .dockerconfigjson: ${payload}
                  EOF
                    echo "synced gitlab-registry-pull into namespace ${namespace}"
                  done
