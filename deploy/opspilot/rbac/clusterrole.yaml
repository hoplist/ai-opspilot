apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: opspilot-readonly
rules:
  - apiGroups:
      - ""
    resources:
      - pods
      - pods/log
      - events
      - namespaces
      - services
      - configmaps
      - nodes
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - apps
    resources:
      - deployments
      - statefulsets
      - daemonsets
      - replicasets
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - argoproj.io
    resources:
      - applications
    verbs:
      - get
      - list
      - watch
