alertmanager:
  enabled: false

prometheus-pushgateway:
  enabled: false

kube-state-metrics:
  enabled: true
  image:
    registry: k8s.m.daocloud.io
    repository: kube-state-metrics/kube-state-metrics
    tag: v2.18.0
    pullPolicy: IfNotPresent

prometheus-node-exporter:
  enabled: true

server:
  image:
    repository: quay.io/prometheus/prometheus
    tag: v3.11.0
    pullPolicy: IfNotPresent
  service:
    type: NodePort
    nodePort: 32092
  persistentVolume:
    enabled: false
  retention: 7d
  global:
    scrape_interval: 30s
    scrape_timeout: 10s
    evaluation_interval: 30s
