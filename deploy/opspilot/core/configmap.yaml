apiVersion: v1
kind: ConfigMap
metadata:
  name: opspilot-core-config
  namespace: opspilot
  labels:
    app.kubernetes.io/name: opspilot-core
    app.kubernetes.io/part-of: opspilot
data:
  OPSPILOT_PORT: "18080"
  OPSPILOT_ACCESS_LOG: "1"
  OPSPILOT_AUDIT_LOG_PATH: "/var/lib/opspilot/audit/audit.jsonl"
  OPSPILOT_EVIDENCE_PACK_DIR: "/var/lib/opspilot/evidence-packs"
  OPSPILOT_EVENT_PACK_ENABLED: "true"
  OPSPILOT_EVENT_PACK_INTERVAL_SECONDS: "300"
  OPSPILOT_CLUSTER: "node200-test"
  OPSPILOT_CLUSTER_KUBECONFIG_DIR: "/var/run/opspilot/clusters"
  OPSPILOT_PROMETHEUS_DEFAULT_SOURCE: "node200-k8s"
  OPSPILOT_PROMETHEUS_DATASOURCES: "node200-k8s=http://opspilot-prometheus-server.monitoring.svc.cluster.local,node206-host=http://192.168.48.206:9090"
  OPSPILOT_NODE_AGENT_DEFAULT_HOST: "node206"
  OPSPILOT_NODE_AGENTS: "node206=http://192.168.48.206:19080"
  OPSPILOT_LOGSEARCH_URL: "http://elasticsearch.logging.svc.cluster.local:9200"
  OPSPILOT_LOGSEARCH_INDEX: "opspilot-k8s-*"
  OPSPILOT_APISIX_INDEX: "apisix-*"
  OPSPILOT_GITLAB_URL: "http://192.168.48.206:8929"
  OPSPILOT_GITOPS_PROJECT: "platform/gitops-manifests"
  OPSPILOT_GITOPS_REF: "main"
  OPSPILOT_SKILLS_DYNAMIC_ENABLED: "1"
  OPSPILOT_SKILLS_DIR: "/opt/opspilot/skills/current/skills"
  OPSPILOT_SKILLS_FALLBACK_ENABLED: "1"
  OPSPILOT_SKILLS_FALLBACK_DIR: "/opt/opspilot/fallback-skills/skills"
  OPSPILOT_SKILLS_GIT_URL: "http://192.168.48.206:8929/platform/opspilot-skills.git"
  OPSPILOT_SKILLS_GIT_REF: "main"
  OPSPILOT_SKILLS_SYNC_SECONDS: "60"
  OPSPILOT_QUALITY_ENABLED: "true"
  OPSPILOT_QUALITY_RUNNER_IMAGE: "192.168.48.206:5050/platform/opspilot/opspilot-core:main"
  OPSPILOT_QUALITY_IMAGE_PULL_SECRET: "gitlab-registry-pull"
  OPSPILOT_QUALITY_JOB_TTL_SECONDS: "3600"
  OPSPILOT_QUALITY_DEADLINE_SECONDS: "120"
  OPSPILOT_CREDENTIAL_CATALOG: "name=opspilot-release-secrets,class=platform-runtime,environment=test,scope=node200/opspilot,storage=kubernetes-secret,namespace=opspilot,used_by=opspilot-core,permissions=read_gitlab|read_registry|write_gitops_confirmed,owner=platform,rotation=90d;name=opspilot-skills-secrets,class=platform-runtime,environment=test,scope=node200/opspilot-skills,storage=kubernetes-secret,namespace=opspilot,used_by=opspilot-core|skills-sync,permissions=read_gitlab_skills,owner=platform,rotation=90d;name=gitlab-registry-pull,class=image-pull,environment=test,scope=node200/namespaces,storage=kubernetes-secret-or-containerd,namespace=opspilot,used_by=opspilot-core|generated-services,permissions=read_registry,owner=platform,rotation=90d;name=GITOPS_TOKEN,class=ci-automation,environment=test,scope=node206/platform/gitops-manifests,storage=gitlab-ci-variable,used_by=platform/opspilot,permissions=write_gitops,owner=platform,rotation=90d"
  OPSPILOT_CLUSTER_CATALOG: "node200-test=environment:test,kubernetes:in-cluster,service_account:opspilot-core,prometheus:node200-k8s,logs:opspilot-k8s,gitops_project:platform/gitops-manifests,path:clusters/test,argocd_ns:argocd,registry:192.168.48.206:5050;node206-host=environment:test,kubernetes:host-agent,prometheus:node206-host,logs:docker-node-agent,registry:192.168.48.206:5050"
  OPSPILOT_RELEASE_SERVICES: "opspilot-core=namespace:opspilot,deployment:opspilot-core,container:core,source:node200-k8s,image:192.168.48.206:5050/platform/opspilot/opspilot-core,gitlab:platform/opspilot,gitops:clusters/test/apps/opspilot-core/deployment.yaml,argocd:opspilot-core"
  OPSPILOT_SERVICE_CATALOG: "opspilot-core=environment:test,group:platform,project:opspilot,owner:platform,repo:platform/opspilot,namespace:opspilot,deployment:opspilot-core,container:core,source:node200-k8s,image:192.168.48.206:5050/platform/opspilot/opspilot-core,gitlab:platform/opspilot,gitops:clusters/test/apps/opspilot-core/deployment.yaml,argocd:opspilot-core,config:env|gitlab-skills,middleware:none,storage:emptyDir"
