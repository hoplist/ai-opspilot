apiVersion: v1
kind: ConfigMap
metadata:
  name: opspilot-core-config
  namespace: opspilot
  labels:
    app.kubernetes.io/name: opspilot-core
    app.kubernetes.io/part-of: opspilot
data:
  OPSPILOT_PORT: "18080"
  OPSPILOT_ACCESS_LOG: "1"
  OPSPILOT_PROMETHEUS_DEFAULT_SOURCE: "node200-k8s"
  OPSPILOT_PROMETHEUS_DATASOURCES: "node200-k8s=http://opspilot-prometheus-server.monitoring.svc.cluster.local,node206-host=http://192.168.48.206:9090"
  OPSPILOT_NODE_AGENT_DEFAULT_HOST: "node206"
  OPSPILOT_NODE_AGENTS: "node206=http://192.168.48.206:19080"
  OPSPILOT_LOGSEARCH_URL: "http://elasticsearch.logging.svc.cluster.local:9200"
  OPSPILOT_LOGSEARCH_INDEX: "opspilot-k8s-*"
  OPSPILOT_APISIX_INDEX: "apisix-*"
  OPSPILOT_GITLAB_URL: "http://192.168.48.206:8929"
  OPSPILOT_GITOPS_PROJECT: "platform/gitops-manifests"
  OPSPILOT_GITOPS_REF: "main"
  OPSPILOT_SKILLS_DYNAMIC_ENABLED: "1"
  OPSPILOT_SKILLS_DIR: "/opt/opspilot/skills/current/skills"
  OPSPILOT_SKILLS_GIT_URL: "http://192.168.48.206:8929/platform/opspilot-skills.git"
  OPSPILOT_SKILLS_GIT_REF: "main"
  OPSPILOT_SKILLS_SYNC_SECONDS: "60"
  OPSPILOT_RELEASE_SERVICES: "opspilot-core=namespace:opspilot,deployment:opspilot-core,container:core,source:node200-k8s,image:192.168.48.206:5050/platform/opspilot/opspilot-core,gitlab:platform/opspilot,gitops:clusters/test/apps/opspilot-core/deployment.yaml,argocd:opspilot-core;ai-loop-demo=namespace:cicd-devex-demo,deployment:ai-loop-demo,container:ai-loop-demo,source:node200-k8s,image:192.168.48.206:5050/platform/devex/demo/ai-loop-demo/ai-loop-demo,gitlab:platform/devex/demo/ai-loop-demo,gitops:clusters/test/apps/devex/demo/ai-loop-demo/deployment.yaml,argocd:devex-demo-ai-loop-demo;python-fastapi-demo=namespace:cicd-devex-python-fastapi-demo,deployment:python-fastapi-demo,container:python-fastapi-demo,source:node200-k8s,image:192.168.48.206:5050/platform/devex/python-fastapi-demo/python-fastapi-demo,gitlab:platform/devex/python-fastapi-demo,gitops:clusters/test/apps/devex/python-fastapi-demo/python-fastapi-demo/deployment.yaml,argocd:devex-python-fastapi-demo-python-fastapi-demo;frontend-vite-demo=namespace:cicd-devex-frontend-vite-demo,deployment:frontend-vite-demo,container:frontend-vite-demo,source:node200-k8s,image:192.168.48.206:5050/platform/devex/frontend-vite-demo/frontend-vite-demo,gitlab:platform/devex/frontend-vite-demo,gitops:clusters/test/apps/devex/frontend-vite-demo/frontend-vite-demo/deployment.yaml,argocd:devex-frontend-vite-demo-frontend-vite-demo;java-spring-demo=namespace:cicd-devex-java-spring-demo,deployment:java-spring-demo,container:java-spring-demo,source:node200-k8s,image:192.168.48.206:5050/platform/devex/java-spring-demo/java-spring-demo,gitlab:platform/devex/java-spring-demo,gitops:clusters/test/apps/devex/java-spring-demo/java-spring-demo/deployment.yaml,argocd:devex-java-spring-demo-java-spring-demo"
