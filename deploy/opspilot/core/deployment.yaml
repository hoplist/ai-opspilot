apiVersion: apps/v1
kind: Deployment
metadata:
  name: opspilot-core
  namespace: opspilot
  labels:
    app.kubernetes.io/name: opspilot-core
    app.kubernetes.io/part-of: opspilot
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: opspilot-core
  template:
    metadata:
      labels:
        app.kubernetes.io/name: opspilot-core
        app.kubernetes.io/part-of: opspilot
    spec:
      serviceAccountName: opspilot-core
      imagePullSecrets:
        - name: gitlab-registry-pull
      containers:
        - name: core
          image: opspilot-core:0.1.9-release-evidence
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: opspilot-core-config
            - secretRef:
                name: opspilot-release-secrets
                optional: true
          ports:
            - name: http
              containerPort: 18080
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
