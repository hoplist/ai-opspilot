apiVersion: apps/v1
kind: Deployment
metadata:
  name: opspilot-core
  namespace: opspilot
  labels:
    app.kubernetes.io/name: opspilot-core
    app.kubernetes.io/part-of: opspilot
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: opspilot-core
  template:
    metadata:
      labels:
        app.kubernetes.io/name: opspilot-core
        app.kubernetes.io/part-of: opspilot
    spec:
      serviceAccountName: opspilot-core
      securityContext:
        fsGroup: 65533
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      imagePullSecrets:
        - name: gitlab-registry-pull
      containers:
        - name: core
          image: opspilot-core:0.1.9-release-evidence
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: opspilot-core-config
            - secretRef:
                name: opspilot-release-secrets
                optional: true
            - secretRef:
                name: opspilot-skills-secrets
                optional: true
          ports:
            - name: http
              containerPort: 18080
          volumeMounts:
            - name: opspilot-skills
              mountPath: /opt/opspilot/skills
              readOnly: true
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /api/live
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/live
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
        - name: skills-sync
          image: 192.168.48.206:5050/platform/opspilot/git-sync:v4.6.0
          imagePullPolicy: IfNotPresent
          args:
            - --repo=$(OPSPILOT_SKILLS_GIT_URL)
            - --ref=$(OPSPILOT_SKILLS_GIT_REF)
            - --root=/skills/root
            - --link=/skills/current
            - --period=$(OPSPILOT_SKILLS_SYNC_SECONDS)s
            - --depth=1
            - --max-failures=-1
            - --group-write
          env:
            - name: OPSPILOT_SKILLS_GIT_URL
              valueFrom:
                configMapKeyRef:
                  name: opspilot-core-config
                  key: OPSPILOT_SKILLS_GIT_URL
            - name: OPSPILOT_SKILLS_GIT_REF
              valueFrom:
                configMapKeyRef:
                  name: opspilot-core-config
                  key: OPSPILOT_SKILLS_GIT_REF
            - name: OPSPILOT_SKILLS_SYNC_SECONDS
              valueFrom:
                configMapKeyRef:
                  name: opspilot-core-config
                  key: OPSPILOT_SKILLS_SYNC_SECONDS
            - name: GITSYNC_USERNAME
              valueFrom:
                secretKeyRef:
                  name: opspilot-skills-secrets
                  key: OPSPILOT_SKILLS_GIT_USERNAME
                  optional: true
            - name: GITSYNC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: opspilot-skills-secrets
                  key: OPSPILOT_SKILLS_GIT_PASSWORD
                  optional: true
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65533
            runAsGroup: 65533
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: opspilot-skills
              mountPath: /skills
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
      volumes:
        - name: opspilot-skills
          emptyDir:
            sizeLimit: 256Mi
