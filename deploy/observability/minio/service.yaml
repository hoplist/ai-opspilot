  namespace: observability
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: minio
  ports:
  - name: api
    port: 9000
    targetPort: 9000
    nodePort: 32093
  - name: console
    port: 9001
    targetPort: 9001
    nodePort: 32094
