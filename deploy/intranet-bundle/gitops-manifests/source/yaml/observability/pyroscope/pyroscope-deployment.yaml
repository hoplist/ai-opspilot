apiVersion: apps/v1
kind: Deployment
metadata:
  name: pyroscope
  namespace: observability
  labels:
    app.kubernetes.io/name: pyroscope
    app.kubernetes.io/part-of: auto-inspection
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pyroscope
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pyroscope
        app.kubernetes.io/part-of: auto-inspection
    spec:
      nodeSelector:
        kubernetes.io/hostname: k8s-worker-2
      containers:
      - name: pyroscope
        image: docker-hub.tpo.xzoa.com/auto-inspection/pyroscope:1.15.1
        imagePullPolicy: IfNotPresent
        args:
        - server
        ports:
        - name: http
          containerPort: 4040
        readinessProbe:
          httpGet:
            path: /ready
            port: 4040
          initialDelaySeconds: 20
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /ready
            port: 4040
          initialDelaySeconds: 40
          periodSeconds: 20
        resources:
          requests:
            cpu: 200m
            memory: 512Mi
          limits:
            cpu: "1"
            memory: 2Gi
        volumeMounts:
        - name: data
          mountPath: /var/lib/pyroscope
      volumes:
      - name: data
        hostPath:
          path: /data/observability/pyroscope
          type: DirectoryOrCreate




