apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: alloy-pyroscope-ebpf
  namespace: observability
  labels:
    app.kubernetes.io/name: alloy-pyroscope-ebpf
    app.kubernetes.io/part-of: auto-inspection
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: alloy-pyroscope-ebpf
  template:
    metadata:
      labels:
        app.kubernetes.io/name: alloy-pyroscope-ebpf
        app.kubernetes.io/part-of: auto-inspection
    spec:
      serviceAccountName: alloy-pyroscope-ebpf
      hostPID: true
      containers:
      - name: alloy
        image: docker-hub.tpo.xzoa.com/auto-inspection/alloy:latest
        imagePullPolicy: IfNotPresent
        args:
        - run
        - --server.http.listen-addr=0.0.0.0:12345
        - --storage.path=/var/lib/alloy/data
        - /etc/alloy/config.alloy
        securityContext:
          privileged: true
          runAsUser: 0
        ports:
        - name: http
          containerPort: 12345
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: "1"
            memory: 1Gi
        volumeMounts:
        - name: config
          mountPath: /etc/alloy/config.alloy
          subPath: config.alloy
        - name: alloy-data
          mountPath: /var/lib/alloy/data
        - name: symb-cache
          mountPath: /tmp/symb-cache
        - name: proc
          mountPath: /proc
          readOnly: true
        - name: sys-kernel-tracing
          mountPath: /sys/kernel/tracing
          readOnly: true
        - name: sys-kernel-debug
          mountPath: /sys/kernel/debug
          readOnly: true
      tolerations:
      - operator: Exists
      volumes:
      - name: config
        configMap:
          name: alloy-pyroscope-ebpf-config
      - name: alloy-data
        emptyDir: {}
      - name: symb-cache
        emptyDir: {}
      - name: proc
        hostPath:
          path: /proc
      - name: sys-kernel-tracing
        hostPath:
          path: /sys/kernel/tracing
      - name: sys-kernel-debug
        hostPath:
          path: /sys/kernel/debug
