apiVersion: apps/v1
kind: Deployment
metadata:
  name: auto-inspection-rca
  namespace: observability
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: auto-inspection-rca
  template:
    metadata:
      annotations:
        auto-inspection.openai.com/release-evidence: gitlab-mr-tag-artifact-digest
        auto-inspection.openai.com/release-evidence-updated-at: "2026-04-28"
      labels:
        app.kubernetes.io/name: auto-inspection-rca
        app.kubernetes.io/part-of: auto-inspection
    spec:
      nodeSelector:
        kubernetes.io/hostname: k8s-worker-2
      serviceAccountName: auto-inspection-rca
      containers:
      - name: backend
        image: ttl.sh/auto-inspection-rca-20260509-k8s-inventory:24h
        imagePullPolicy: Always
        workingDir: /opt/rca
        env:
        - name: RCA_SERVICE
          value: backend
        - name: PYTHONUNBUFFERED
          value: "1"
        - name: CONFIG_FILE
          value: /opt/config/config.json
        - name: ARGOCD_SERVER
          value: https://argocd-server.argocd.svc.cluster.local
        - name: ARGOCD_VERIFY_TLS
          value: "false"
        - name: ARGOCD_TOKEN
          valueFrom:
            secretKeyRef:
              name: auto-inspection-rca-argocd
              key: ARGOCD_TOKEN
        - name: GITLAB_URL
          value: http://192.168.48.206:8929
        - name: GITLAB_PROJECT_ID
          value: platform/gitops-manifests
        - name: GITLAB_VERIFY_TLS
          value: "false"
        - name: GITLAB_TOKEN
          valueFrom:
            secretKeyRef:
              name: auto-inspection-rca-gitlab
              key: GITLAB_TOKEN
              optional: true
        - name: INVESTIGATION_MYSQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: auto-inspection-rca-db
              key: INVESTIGATION_MYSQL_PASSWORD
        - name: MINIO_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: auto-inspection-rca-db
              key: MINIO_ACCESS_KEY
        - name: MINIO_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: auto-inspection-rca-db
              key: MINIO_SECRET_KEY
        ports:
        - containerPort: 18080
          name: backend
        readinessProbe:
          httpGet:
            path: /api/health
            port: 18080
          initialDelaySeconds: 15
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /api/health
            port: 18080
          initialDelaySeconds: 30
          periodSeconds: 20
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: "1"
            memory: 1Gi
        volumeMounts:
        - name: app-data
          mountPath: /opt/rca/data
        - name: app-outputs
          mountPath: /opt/rca/outputs
        - name: config
          mountPath: /opt/config/config.json
          subPath: config.json
      - name: mcp
        image: ttl.sh/auto-inspection-rca-20260509-k8s-inventory:24h
        imagePullPolicy: Always
        workingDir: /opt/rca
        env:
        - name: RCA_SERVICE
          value: mcp
        - name: PYTHONUNBUFFERED
          value: "1"
        - name: CONFIG_FILE
          value: /opt/config/config.json
        - name: ARGOCD_SERVER
          value: https://argocd-server.argocd.svc.cluster.local
        - name: ARGOCD_VERIFY_TLS
          value: "false"
        - name: ARGOCD_TOKEN
          valueFrom:
            secretKeyRef:
              name: auto-inspection-rca-argocd
              key: ARGOCD_TOKEN
        - name: GITLAB_URL
          value: http://192.168.48.206:8929
        - name: GITLAB_PROJECT_ID
          value: platform/gitops-manifests
        - name: GITLAB_VERIFY_TLS
          value: "false"
        - name: GITLAB_TOKEN
          valueFrom:
            secretKeyRef:
              name: auto-inspection-rca-gitlab
              key: GITLAB_TOKEN
              optional: true
        - name: INVESTIGATION_MYSQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: auto-inspection-rca-db
              key: INVESTIGATION_MYSQL_PASSWORD
        - name: MINIO_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: auto-inspection-rca-db
              key: MINIO_ACCESS_KEY
        - name: MINIO_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: auto-inspection-rca-db
              key: MINIO_SECRET_KEY
        ports:
        - containerPort: 18081
          name: mcp
        readinessProbe:
          tcpSocket:
            port: 18081
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          tcpSocket:
            port: 18081
          initialDelaySeconds: 20
          periodSeconds: 20
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        volumeMounts:
        - name: app-data
          mountPath: /opt/rca/data
        - name: app-outputs
          mountPath: /opt/rca/outputs
        - name: config
          mountPath: /opt/config/config.json
          subPath: config.json
      volumes:
      - name: app-data
        hostPath:
          path: /data/observability/auto-inspection-rca/data
          type: DirectoryOrCreate
      - name: app-outputs
        hostPath:
          path: /data/observability/auto-inspection-rca/outputs
          type: DirectoryOrCreate
      - name: config
        configMap:
          name: auto-inspection-rca-config




