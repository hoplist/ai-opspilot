apiVersion: v1
kind: ConfigMap
metadata:
  name: auto-inspection-rca-config
  namespace: observability
data:
  config.json: |
    {
      "PROMETHEUS_URLS": [
        "http://192.168.48.200:32092"
      ],
      "PROMETHEUS_CLUSTERS": [
        "kubernetes"
      ],
      "SOURCE_ID": "shared-kubernetes-observability",
      "OPENSEARCH_URL": "http://opensearch.observability.svc.cluster.local:9200",
      "OPENSEARCH_DASHBOARDS_URL": "http://192.168.48.200:32091",
      "OPENSEARCH_VERIFY_SSL": false,
      "OPENSEARCH_INDEX_LOGS": "logs-k8s-*",
      "OPENSEARCH_INDEX_EVENTS": "events-k8s-*",
      "OPENSEARCH_INDEX_TRACES": "otel-traces-*",
      "OPENSEARCH_INDEX_INCIDENTS": "inspection-incidents-*",
      "OPENSEARCH_INDEX_INVESTIGATIONS": "inspection-investigations-*",
      "OPENSEARCH_SNAPSHOT_REPOSITORY": "auto-inspection-local-fs",
      "OPENSEARCH_SNAPSHOT_PATH": "/usr/share/opensearch/data/snapshots",
      "OPENSEARCH_RETENTION_LOGS_DAYS": 14,
      "OPENSEARCH_RETENTION_EVENTS_DAYS": 30,
      "OPENSEARCH_RETENTION_INCIDENTS_DAYS": 60,
      "OPENSEARCH_RETENTION_INVESTIGATIONS_DAYS": 90,
      "INVESTIGATION_HOT_STORE_DRIVER": "mysql",
      "INVESTIGATION_MYSQL_HOST": "mysql-31326.observability.svc.cluster.local",
      "INVESTIGATION_MYSQL_PORT": 3306,
      "INVESTIGATION_MYSQL_USER": "root",
      "INVESTIGATION_MYSQL_DATABASE": "auto_inspection",
      "INVESTIGATION_COLD_STORE_DRIVER": "minio",
      "MINIO_ENDPOINT": "minio.observability.svc.cluster.local:9000",
      "MINIO_BUCKET": "auto-inspection-archive",
      "MINIO_SECURE": false,
      "MINIO_PREFIX": "investigations",
      "AI_INVESTIGATION_ENABLED": true,
      "AI_INVESTIGATION_MAX_LOGS": 200,
      "AI_INVESTIGATION_MAX_EVENTS": 100,
      "AI_INVESTIGATION_MAX_PODS": 3,
      "AI_INVESTIGATION_LOG_TAIL_LINES": 120,
      "K8S_DIRECT_ENABLED": true,
      "K8S_IN_CLUSTER_ENABLED": true,
      "BUSINESS_DOMAIN_SUFFIXES": [
        "tpo.xzoa.com"
      ],
      "BUSINESS_BACKEND_SUFFIX": "-server",
      "BUSINESS_FRONTEND_SUFFIX": "-web",
      "BUSINESS_SERVICE_MAP": {},
      "RUNBOOK_FILE": "runbooks/runbooks.json"
    }
