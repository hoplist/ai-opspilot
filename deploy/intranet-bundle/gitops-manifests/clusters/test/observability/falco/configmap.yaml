apiVersion: v1
kind: ConfigMap
metadata:
  name: falco
  namespace: observability
  labels:
    app.kubernetes.io/name: falco
    app.kubernetes.io/part-of: auto-inspection
data:
  falco.yaml: |
    engine:
      kind: modern_ebpf
      modern_ebpf:
        buf_size_preset: 4
        cpus_for_each_buffer: 2
        drop_failed_exit: false
    rules_files:
      - /etc/falco/falco_rules.yaml
      - /etc/falco/falco_rules.local.yaml
      - /etc/falco/rules.d
    load_plugins:
      - container
    plugins:
      - name: container
        library_path: libcontainer.so
        init_config:
          label_max_len: 100
          with_size: false
          hooks:
            - create
          engines:
            bpm:
              enabled: true
            containerd:
              enabled: true
              sockets:
                - /run/host-containerd/containerd.sock
                - /run/containerd/containerd.sock
            cri:
              enabled: true
              sockets:
                - /run/containerd/containerd.sock
                - /run/host-containerd/containerd.sock
            docker:
              enabled: false
            libvirt_lxc:
              enabled: false
            lxc:
              enabled: false
            podman:
              enabled: false
    priority: notice
    json_output: true
    json_include_output_property: true
    json_include_output_fields_property: true
    json_include_tags_property: true
    stdout_output:
      enabled: true
    syslog_output:
      enabled: false
    file_output:
      enabled: false
    http_output:
      enabled: false
    grpc_output:
      enabled: false
    grpc:
      enabled: false
      bind_address: unix:///run/falco/falco.sock
    webserver:
      enabled: true
      listen_address: 0.0.0.0
      listen_port: 8765
      k8s_healthz_endpoint: /healthz
      ssl_enabled: false
      threadiness: 0
    log_level: info
    log_stderr: true
    time_format_iso_8601: true
