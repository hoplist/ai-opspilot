apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: auto-inspection-rca-read
rules:
- apiGroups: [""]
  resources:
  - pods
  - pods/log
  - services
  - events
  - namespaces
  - nodes
  - configmaps
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources:
  - deployments
  - statefulsets
  - daemonsets
  - replicasets
  verbs: ["get", "list", "watch"]
