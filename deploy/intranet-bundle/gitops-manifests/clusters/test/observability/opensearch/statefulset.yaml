apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: opensearch
  namespace: observability
spec:
  serviceName: opensearch-headless
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: opensearch
  template:
    metadata:
      labels:
        app.kubernetes.io/name: opensearch
        app.kubernetes.io/part-of: auto-inspection
    spec:
      nodeSelector:
        kubernetes.io/hostname: k8s-worker-2
      terminationGracePeriodSeconds: 120
      securityContext:
        fsGroup: 1000
      initContainers:
      - name: sysctl
        image: docker-hub.tpo.xzoa.com/auto-inspection/busybox:1.36
        command:
        - sh
        - -c
        - sysctl -w vm.max_map_count=262144
        securityContext:
          privileged: true
          runAsUser: 0
      - name: prepare-data-dir
        image: docker-hub.tpo.xzoa.com/auto-inspection/busybox:1.36
        command:
        - sh
        - -c
        - mkdir -p /data && chmod 0777 /data
        securityContext:
          runAsUser: 0
        volumeMounts:
        - name: data
          mountPath: /data
      containers:
      - name: opensearch
        image: docker-hub.tpo.xzoa.com/auto-inspection/opensearch:2.19.5
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 9200
        - name: transport
          containerPort: 9300
        - name: metrics
          containerPort: 9600
        env:
        - name: discovery.type
          value: single-node
        - name: DISABLE_INSTALL_DEMO_CONFIG
          value: "true"
        - name: DISABLE_SECURITY_PLUGIN
          value: "true"
        - name: OPENSEARCH_JAVA_OPTS
          value: -Xms768m -Xmx768m
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: "2"
            memory: 2Gi
        securityContext:
          runAsUser: 1000
          runAsGroup: 1000
        volumeMounts:
        - name: config
          mountPath: /usr/share/opensearch/config/opensearch.yml
          subPath: opensearch.yml
        - name: data
          mountPath: /usr/share/opensearch/data
        readinessProbe:
          httpGet:
            path: /
            port: 9200
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 12
        livenessProbe:
          httpGet:
            path: /
            port: 9200
          initialDelaySeconds: 60
          periodSeconds: 20
          timeoutSeconds: 5
          failureThreshold: 6
      volumes:
      - name: config
        configMap:
          name: opensearch-config
      - name: data
        hostPath:
          path: /data/observability/opensearch
          type: DirectoryOrCreate




