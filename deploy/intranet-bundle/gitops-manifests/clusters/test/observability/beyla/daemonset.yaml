apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: beyla
  namespace: observability
  labels:
    app.kubernetes.io/name: beyla
    app.kubernetes.io/part-of: auto-inspection
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: beyla
  template:
    metadata:
      labels:
        app.kubernetes.io/name: beyla
        app.kubernetes.io/part-of: auto-inspection
    spec:
      serviceAccountName: beyla
      hostPID: true
      containers:
      - name: beyla
        image: docker-hub.tpo.xzoa.com/auto-inspection/beyla:latest
        imagePullPolicy: IfNotPresent
        securityContext:
          privileged: true
          readOnlyRootFilesystem: true
        env:
        - name: BEYLA_CONFIG_PATH
          value: /config/beyla-config.yml
        - name: BEYLA_KUBE_METADATA_ENABLE
          value: "true"
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: http://otel-collector.observability.svc.cluster.local:4318
        - name: OTEL_EXPORTER_OTLP_PROTOCOL
          value: http/protobuf
        - name: KUBE_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        volumeMounts:
        - name: config
          mountPath: /config
        - name: cache
          mountPath: /.cache
        - name: var-run-beyla
          mountPath: /var/run/beyla
        - name: cgroup
          mountPath: /sys/fs/cgroup
        - name: bpffs
          mountPath: /sys/fs/bpf
      tolerations:
      - operator: Exists
      volumes:
      - name: config
        configMap:
          name: beyla-config
      - name: var-run-beyla
        emptyDir: {}
      - name: cache
        emptyDir: {}
      - name: cgroup
        hostPath:
          path: /sys/fs/cgroup
      - name: bpffs
        hostPath:
          path: /sys/fs/bpf
          type: DirectoryOrCreate
