apiVersion: apps/v1
kind: Deployment
metadata:
  name: fluent-bit-events
  namespace: observability
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: fluent-bit-events
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fluent-bit-events
        app.kubernetes.io/part-of: auto-inspection
    spec:
      serviceAccountName: fluent-bit
      containers:
      - name: fluent-bit
        image: docker-hub.tpo.xzoa.com/auto-inspection/fluent-bit:3.2.8
        imagePullPolicy: IfNotPresent
        args:
        - -c
        - /fluent-bit/etc/fluent-bit-events.conf
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 250m
            memory: 256Mi
        volumeMounts:
        - name: config
          mountPath: /fluent-bit/etc/fluent-bit-events.conf
          subPath: fluent-bit-events.conf
        - name: scripts
          mountPath: /fluent-bit/scripts/normalize_events.lua
          subPath: normalize_events.lua
        - name: state
          mountPath: /var/fluent-bit/state
      volumes:
      - name: config
        configMap:
          name: fluent-bit-events-config
          items:
          - key: fluent-bit-events.conf
            path: fluent-bit-events.conf
      - name: scripts
        configMap:
          name: fluent-bit-events-config
          items:
          - key: normalize_events.lua
            path: normalize_events.lua
      - name: state
        emptyDir: {}
