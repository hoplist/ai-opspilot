apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fluent-bit-logs
  namespace: observability
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: fluent-bit-logs
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fluent-bit-logs
        app.kubernetes.io/part-of: auto-inspection
    spec:
      serviceAccountName: fluent-bit
      tolerations:
      - operator: Exists
      containers:
      - name: fluent-bit
        image: docker-hub.tpo.xzoa.com/auto-inspection/fluent-bit:3.2.8
        imagePullPolicy: IfNotPresent
        volumeMounts:
        - name: config
          mountPath: /fluent-bit/etc/fluent-bit.conf
          subPath: fluent-bit.conf
        - name: parsers
          mountPath: /fluent-bit/etc/parsers.conf
          subPath: parsers.conf
        - name: scripts
          mountPath: /fluent-bit/scripts/normalize_logs.lua
          subPath: normalize_logs.lua
        - name: varlog
          mountPath: /var/log
        - name: state
          mountPath: /var/fluent-bit/state
        ports:
        - containerPort: 2020
          name: api
      volumes:
      - name: config
        configMap:
          name: fluent-bit-logs-config
          items:
          - key: fluent-bit.conf
            path: fluent-bit.conf
      - name: parsers
        configMap:
          name: fluent-bit-logs-config
          items:
          - key: parsers.conf
            path: parsers.conf
      - name: scripts
        configMap:
          name: fluent-bit-logs-config
          items:
          - key: normalize_logs.lua
            path: normalize_logs.lua
      - name: varlog
        hostPath:
          path: /var/log
      - name: state
        hostPath:
          path: /var/lib/fluent-bit
          type: DirectoryOrCreate
