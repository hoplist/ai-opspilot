apiVersion: apps/v1
kind: Deployment
metadata:
  name: opensearch-dashboards
  namespace: observability
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: opensearch-dashboards
  template:
    metadata:
      labels:
        app.kubernetes.io/name: opensearch-dashboards
        app.kubernetes.io/part-of: auto-inspection
    spec:
      securityContext:
        fsGroup: 1000
      initContainers:
      - name: prepare-dashboards-home
        image: docker-hub.tpo.xzoa.com/auto-inspection/opensearch-dashboards:2
        imagePullPolicy: IfNotPresent
        command:
        - sh
        - -c
        - |
          set -e
          cp -a /usr/share/opensearch-dashboards/. /shared/
          cd /shared
          bin/opensearch-dashboards-plugin remove securityDashboards --allow-root
          chown -R 1000:1000 /shared
        securityContext:
          runAsUser: 0
        volumeMounts:
        - name: dashboards-home
          mountPath: /shared
      containers:
      - name: opensearch-dashboards
        image: docker-hub.tpo.xzoa.com/auto-inspection/opensearch-dashboards:2
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 5601
        readinessProbe:
          tcpSocket:
            port: 5601
          initialDelaySeconds: 20
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 18
        livenessProbe:
          tcpSocket:
            port: 5601
          initialDelaySeconds: 60
          periodSeconds: 20
          timeoutSeconds: 3
          failureThreshold: 6
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 1Gi
        volumeMounts:
        - name: dashboards-home
          mountPath: /usr/share/opensearch-dashboards
        - name: config
          mountPath: /usr/share/opensearch-dashboards/config/opensearch_dashboards.yml
          subPath: opensearch_dashboards.yml
      volumes:
      - name: dashboards-home
        emptyDir: {}
      - name: config
        configMap:
          name: opensearch-dashboards-config
