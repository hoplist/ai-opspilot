apiVersion: v1
kind: PersistentVolume
metadata:
  name: opensearch-nfs-pv-206
spec:
  capacity:
    storage: 50Gi
  accessModes:
  - ReadWriteMany
  volumeMode: Filesystem
  persistentVolumeReclaimPolicy: Retain
  storageClassName: nfs-206-observability-opensearch-static
  mountOptions:
  - hard
  - nfsvers=4.1
  nfs:
    server: 192.168.48.206
    path: /srv/nfs/observability/opensearch

