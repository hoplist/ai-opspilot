apiVersion: v1
kind: PersistentVolume
metadata:
  name: minio-nfs-pv-206
spec:
  capacity:
    storage: 20Gi
  accessModes:
  - ReadWriteMany
  volumeMode: Filesystem
  persistentVolumeReclaimPolicy: Retain
  storageClassName: nfs-206-observability-minio-static
  mountOptions:
  - hard
  - nfsvers=4.1
  nfs:
    server: 192.168.48.206
    path: /srv/nfs/observability/minio
