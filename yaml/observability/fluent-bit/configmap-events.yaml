apiVersion: v1
kind: ConfigMap
metadata:
  name: fluent-bit-events-config
  namespace: observability
data:
  fluent-bit-events.conf: |
    [SERVICE]
        Flush                     1
        Daemon                    Off
        Log_Level                 info
        storage.path              /var/fluent-bit/state/storage
        storage.sync              normal
        storage.checksum          off
        storage.backlog.mem_limit 20M

    [INPUT]
        Name                kubernetes_events
        Tag                 k8s_events
        DB                  /var/fluent-bit/state/flb_kube_events.db
        DB.Sync             Normal

    [FILTER]
        Name                modify
        Match               k8s_events
        Add                 cluster kubernetes

    [FILTER]
        Name                lua
        Match               k8s_events
        script              /fluent-bit/scripts/normalize_events.lua
        call                normalize_event_record

    [OUTPUT]
        Name                opensearch
        Match               k8s_events
        Host                opensearch.observability.svc.cluster.local
        Port                9200
        Suppress_Type_Name  On
        Logstash_Format     On
        Logstash_Prefix     events-k8s
        Generate_ID         On
        Retry_Limit         False
        tls                 Off

  normalize_events.lua: |
    function normalize_event_record(tag, timestamp, record)
      local metadata = record["metadata"]
      local involved = record["involvedObject"]
      local source = record["source"]

      if type(metadata) == "table" then
        if record["namespace"] == nil then
          record["namespace"] = metadata["namespace"]
        end
      end

      if type(involved) == "table" then
        record["object_kind"] = record["object_kind"] or involved["kind"]
        record["object_name"] = record["object_name"] or involved["name"]
        if involved["kind"] == "Pod" and record["pod"] == nil then
          record["pod"] = involved["name"]
        end
      end

      if record["message"] == nil and record["note"] ~= nil then
        record["message"] = record["note"]
      end
      if record["reporting_component"] == nil then
        if record["reportingComponent"] ~= nil then
          record["reporting_component"] = record["reportingComponent"]
        elseif type(source) == "table" then
          record["reporting_component"] = source["component"]
        end
      end

      return 2, timestamp, record
    end
