apiVersion: apps/v1
kind: Deployment
metadata:
  name: auto-inspection-rca
  namespace: observability
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: auto-inspection-rca
  template:
    metadata:
      annotations:
        auto-inspection.openai.com/release-evidence: gitlab-mr-tag-artifact-digest
        auto-inspection.openai.com/release-evidence-updated-at: "2026-04-28"
      labels:
        app.kubernetes.io/name: auto-inspection-rca
        app.kubernetes.io/part-of: auto-inspection
    spec:
      serviceAccountName: auto-inspection-rca
      containers:
      - name: backend
        image: python:3.12-slim
        imagePullPolicy: IfNotPresent
        workingDir: /opt/rca
        command:
        - /bin/sh
        - -lc
        args:
        - python -m pip install --no-cache-dir requests minio pymysql && python backend_server.py --host 0.0.0.0 --port 18080
        env:
        - name: PYTHONUNBUFFERED
          value: "1"
        - name: CONFIG_FILE
          value: /opt/config/config.json
        - name: INVESTIGATION_MYSQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: auto-inspection-rca-db
              key: INVESTIGATION_MYSQL_PASSWORD
        - name: MINIO_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: auto-inspection-rca-db
              key: MINIO_ACCESS_KEY
        - name: MINIO_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: auto-inspection-rca-db
              key: MINIO_SECRET_KEY
        ports:
        - containerPort: 18080
          name: backend
        readinessProbe:
          httpGet:
            path: /api/health
            port: 18080
          initialDelaySeconds: 15
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /api/health
            port: 18080
          initialDelaySeconds: 30
          periodSeconds: 20
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: "1"
            memory: 1Gi
        volumeMounts:
        - name: app-source
          mountPath: /opt/rca
        - name: config
          mountPath: /opt/config/config.json
          subPath: config.json
      - name: mcp
        image: python:3.12-slim
        imagePullPolicy: IfNotPresent
        workingDir: /opt/rca
        command:
        - /bin/sh
        - -lc
        args:
        - python -m pip install --no-cache-dir requests minio pymysql && python auto_inspection_mcp.py --host 0.0.0.0 --port 18081
        env:
        - name: PYTHONUNBUFFERED
          value: "1"
        - name: CONFIG_FILE
          value: /opt/config/config.json
        - name: INVESTIGATION_MYSQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: auto-inspection-rca-db
              key: INVESTIGATION_MYSQL_PASSWORD
        - name: MINIO_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: auto-inspection-rca-db
              key: MINIO_ACCESS_KEY
        - name: MINIO_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: auto-inspection-rca-db
              key: MINIO_SECRET_KEY
        ports:
        - containerPort: 18081
          name: mcp
        readinessProbe:
          tcpSocket:
            port: 18081
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          tcpSocket:
            port: 18081
          initialDelaySeconds: 20
          periodSeconds: 20
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        volumeMounts:
        - name: app-source
          mountPath: /opt/rca
        - name: config
          mountPath: /opt/config/config.json
          subPath: config.json
      volumes:
      - name: app-source
        persistentVolumeClaim:
          claimName: auto-inspection-rca-source
      - name: config
        configMap:
          name: auto-inspection-rca-config
