apiVersion: v1
kind: PersistentVolume
metadata:
  name: auto-inspection-rca-source-pv-206
spec:
  capacity:
    storage: 2Gi
  accessModes:
  - ReadWriteMany
  volumeMode: Filesystem
  persistentVolumeReclaimPolicy: Retain
  storageClassName: nfs-206-observability-rca-static
  mountOptions:
  - hard
  - nfsvers=4.1
  nfs:
    server: 192.168.48.206
    path: /srv/nfs/observability/auto-inspection-rca
