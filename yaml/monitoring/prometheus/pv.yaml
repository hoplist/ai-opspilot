apiVersion: v1
kind: PersistentVolume
metadata:
  name: prometheus-server-nfs-pv-206
spec:
  capacity:
    storage: 30Gi
  accessModes:
  - ReadWriteMany
  volumeMode: Filesystem
  persistentVolumeReclaimPolicy: Retain
  storageClassName: nfs-206-monitoring-prometheus-static
  mountOptions:
  - hard
  - nfsvers=4.1
  nfs:
    server: 192.168.48.206
    path: /srv/nfs/monitoring/prometheus

