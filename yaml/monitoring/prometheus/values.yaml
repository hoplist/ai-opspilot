alertmanager:
  enabled: false

prometheus-pushgateway:
  enabled: false

kube-state-metrics:
  enabled: true
  image:
    registry: k8s.m.daocloud.io
    repository: kube-state-metrics/kube-state-metrics
    tag: v2.18.0
  resources:
    requests:
      cpu: 20m
      memory: 32Mi
    limits:
      cpu: 200m
      memory: 256Mi

prometheus-node-exporter:
  enabled: true
  resources: {}

server:
  retention: "7d"
  strategy:
    type: Recreate
  resources:
    requests:
      cpu: 250m
      memory: 768Mi
    limits:
      cpu: "1"
      memory: 2Gi
  persistentVolume:
    enabled: true
    storageClass: nfs-206-monitoring-prometheus-static
    accessModes:
      - ReadWriteMany
    size: 30Gi
  service:
    enabled: true
    type: NodePort
    servicePort: 9090
    nodePort: 32092
